<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>World One</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='8' fill='%230d0f18'/%3E%3Ccircle cx='16' cy='16' r='11' fill='none' stroke='%237c6ff7' stroke-width='1.8'/%3E%3Cellipse cx='16' cy='16' rx='5' ry='11' fill='none' stroke='%237c6ff7' stroke-width='1.2'/%3E%3Cline x1='5' y1='16' x2='27' y2='16' stroke='%237c6ff7' stroke-width='1.2'/%3E%3Cline x1='7' y1='10' x2='25' y2='10' stroke='%237c6ff7' stroke-width='1' stroke-dasharray='2 1.5'/%3E%3Cline x1='7' y1='22' x2='25' y2='22' stroke='%237c6ff7' stroke-width='1' stroke-dasharray='2 1.5'/%3E%3C/svg%3E">
<style>
:root {
  --bg: #0d0f18; --surface: #13151f; --surface2: #1c1f2e; --surface3: #242840;
  --border: #272b3e; --border2: #343850; --text: #d0d8f0; --text-dim: #6b7a9e;
  --text-muted: #3d4460; --accent: #7c6ff7; --accent-h: #9a90ff;
  --accent-glow: rgba(124,111,247,0.18); --danger: #ff4f6a; --success: #4fbf8f;
  --active: rgba(124,111,247,0.14); --radius: 8px;
  --funcbar-w: 48px; --panel-w: 220px; --chat-panel-w: 340px;
  /* ── AIPP 标准 widget 主题变量（--aipp-* 命名空间） ──
     host 默认将自身主题映射到这些变量，外部 widget 嵌入时直接读取即可 */
  --aipp-bg:        var(--bg);
  --aipp-surface:   var(--surface);
  --aipp-text:      var(--text);
  --aipp-text-dim:  var(--text-dim);
  --aipp-border:    var(--border);
  --aipp-accent:    var(--accent);
  --aipp-font:      -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  --aipp-font-size: 13px;
  --aipp-radius:    var(--radius);
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: var(--bg); color: var(--text);
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  height: 100vh; overflow: hidden; display: flex; flex-direction: column;
}


/* ── Topbar ── */
.topbar {
  height: 46px; background: var(--surface); border-bottom: 1px solid var(--border);
  display: flex; align-items: center; padding: 0 14px; gap: 10px; flex-shrink: 0; z-index: 10;
}
.brand { font-weight: 700; font-size: 15px; color: var(--accent); }
.brand-sub { color: var(--text-dim); font-weight: 400; font-size: 12px; margin-left: 4px; }
.topbar-spacer { flex: 1; }
.mode-badge {
  background: var(--surface3); border: 1px solid var(--border2);
  border-radius: 20px; padding: 2px 10px; font-size: 11px; color: var(--text-dim); transition: all .3s;
}
body.canvas-mode .mode-badge { color: var(--accent); border-color: var(--accent); background: var(--accent-glow); }
.topbar-btn {
  background: none; border: 1px solid var(--border2); border-radius: var(--radius);
  color: var(--text-dim); height: 30px; padding: 0 10px; cursor: pointer;
  display: flex; align-items: center; gap: 5px; font-size: 12px; transition: all .15s;
}
.topbar-btn:hover { color: var(--text); border-color: var(--text-dim); }
.topbar-btn.exit-canvas { display: none; }
body.canvas-mode .topbar-btn.exit-canvas { display: flex; }
.canvas-session-label { font-size: 11px; color: var(--text-muted); white-space: nowrap; vertical-align: middle; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.5} }

/* ── Workspace ── */
.workspace { flex: 1; display: flex; overflow: hidden; }

/* ══════════════════════════════════════
   FUNCTION BAR — always 48px, never collapses
   ══════════════════════════════════════ */
.funcbar {
  width: var(--funcbar-w); background: var(--surface);
  border-right: 1px solid var(--border);
  display: flex; flex-direction: column; justify-content: space-between;
  flex-shrink: 0; z-index: 2;
}
.funcbar-top, .funcbar-bottom {
  display: flex; flex-direction: column; align-items: center; padding: 8px 0; gap: 2px;
}
.funcbar-sep { height: 1px; background: var(--border); margin: 6px 10px; }
.fb-btn {
  width: 36px; height: 36px; border: none; background: none; border-radius: 8px;
  cursor: pointer; display: flex; align-items: center; justify-content: center;
  color: var(--text-muted); transition: all .15s; position: relative;
}
.fb-btn svg { width: 16px; height: 16px; fill: none; stroke: currentColor; stroke-width: 1.8; stroke-linecap: round; stroke-linejoin: round; }
.fb-btn:hover { background: var(--surface2); color: var(--text-dim); }
.fb-btn.active { background: var(--active); color: var(--accent); }
.fb-btn.unconfigured { color: var(--danger); animation: pulse 2s infinite; }
/* active indicator: left bar */
.fb-btn.active::before {
  content: ''; position: absolute; left: -1px; top: 8px; bottom: 8px;
  width: 2px; background: var(--accent); border-radius: 0 2px 2px 0;
}
.user-badge {
  width: 28px; height: 28px; border-radius: 50%; background: linear-gradient(135deg, var(--accent), #5a4fd0);
  display: flex; align-items: center; justify-content: center;
  font-size: 11px; font-weight: 700; color: #fff; cursor: default; letter-spacing: 0;
}

/* ══════════════════════════════════════
   TASK PANEL — collapsible, slides in/out
   ══════════════════════════════════════ */
.task-panel {
  width: var(--panel-w); background: var(--surface);
  border-right: 1px solid var(--border);
  display: flex; flex-direction: column; flex-shrink: 0;
  overflow: hidden; transition: width .2s ease;
}
.task-panel.collapsed { width: 0; border-right-color: transparent; }

.panel-header {
  height: 46px; display: flex; align-items: center; padding: 0 8px 0 12px;
  gap: 6px; border-bottom: 1px solid var(--border); flex-shrink: 0; white-space: nowrap;
}
.panel-title {
  font-size: 11px; font-weight: 600; color: var(--text-dim);
  text-transform: uppercase; letter-spacing: .8px; flex: 1;
}
/* IntelliJ-style panel icon buttons — no bg/border by default, hover shows rect highlight */
.panel-icon-btn {
  background: none; border: none; border-radius: 4px;
  color: var(--text-muted); width: 24px; height: 24px; padding: 0; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: background .12s, color .12s; flex-shrink: 0;
}
.panel-icon-btn:hover { background: var(--surface3); color: var(--text); }
.panel-icon-btn svg {
  width: 14px; height: 14px; fill: none;
  stroke: currentColor; stroke-width: 1.7; stroke-linecap: round; stroke-linejoin: round;
}

.session-list { flex: 1; overflow-y: auto; padding: 6px 6px 6px; display: flex; flex-direction: column; }
.session-list-spacer { flex: 1; min-height: 8px; }
.history-groups { flex-shrink: 0; }

.session-divider {
  height: 1px; background: var(--border); margin: 6px 4px;
}
.section-label {
  font-size: 9px; color: var(--text-muted); padding: 5px 8px 2px;
  text-transform: uppercase; letter-spacing: .6px;
}

/* Collapsible history group header */
.history-group-hd {
  display: flex; align-items: center; gap: 4px; padding: 5px 8px 4px;
  cursor: pointer; font-size: 9px; text-transform: uppercase; letter-spacing: .6px;
  color: var(--text-muted); user-select: none; border-top: 1px solid var(--border);
  margin-top: 2px;
}
.history-group-hd:hover { color: var(--text-dim); }
.history-group-hd .hg-count {
  font-size: 9px; background: var(--surface3); border-radius: 8px; padding: 0 4px;
}
.history-group-hd .hg-spacer { flex: 1; }
.history-group-hd .hg-chevron { font-size: 10px; transition: transform .15s; }
.history-group.open .hg-chevron { transform: rotate(0deg); }
.history-group:not(.open) .hg-chevron { transform: rotate(-90deg); }
.history-group-body { overflow: hidden; }
.history-group:not(.open) .history-group-body { display: none; }

/* Search + pagination inside completed group */
.hg-search-row {
  display: flex; gap: 4px; padding: 4px 7px;
}
.hg-search {
  flex: 1; background: var(--surface2); border: 1px solid var(--border2); border-radius: 4px;
  color: var(--text); font-size: 10.5px; padding: 3px 7px; outline: none;
}
.hg-search:focus { border-color: var(--accent); }
.hg-pager {
  display: flex; align-items: center; justify-content: center; gap: 4px;
  padding: 3px 7px 5px; font-size: 10.5px; color: var(--text-muted);
}
.hg-pager-btn {
  background: none; border: 1px solid var(--border2); border-radius: 3px;
  color: var(--text-muted); cursor: pointer; padding: 1px 6px; font-size: 11px;
  transition: all .1s;
}
.hg-pager-btn:hover:not(:disabled) { color: var(--accent); border-color: var(--accent); }
.hg-pager-btn:disabled { opacity: .3; cursor: default; }

.session-item {
  padding: 6px 7px; border-radius: var(--radius); cursor: pointer;
  font-size: 12px; color: var(--text-dim); transition: background .15s;
  display: flex; align-items: center; gap: 6px; white-space: nowrap; overflow: hidden;
  position: relative;
}
.session-item:hover { background: var(--surface2); }
.session-item.active { background: var(--active); color: var(--text); }
/* Archived sessions: clickable to view, slightly dimmed */
.session-item.archived-session { opacity: .65; }
.session-item.archived-session:hover { background: var(--surface2); opacity: .85; }
.session-icon { font-size: 13px; flex-shrink: 0; line-height: 1; }
.session-label { flex: 1; overflow: hidden; text-overflow: ellipsis; }
.session-label-event {
  display: flex; flex-direction: column; line-height: 1.35;
  min-width: 0; flex: 1; overflow: hidden;
}
.session-label-event .event-primary,
.session-label-event .event-secondary {
  overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
}
.session-label-event .event-secondary {
  font-size: 10px; color: var(--text-muted);
}

.session-actions { display: none; gap: 2px; flex-shrink: 0; }
.session-item:hover .session-actions { display: flex; }
.sess-act {
  background: none; border: none; cursor: pointer; color: var(--text-muted);
  font-size: 11px; padding: 1px 3px; border-radius: 3px; transition: all .1s; line-height: 1;
}
.sess-act:hover { background: var(--surface3); color: var(--text); }
.sess-act.ok:hover   { color: var(--success); }
.sess-act.bad:hover  { color: var(--danger); }
.sess-act.dim:hover  { color: var(--text-dim); }


.panel-footer {
  padding: 6px 8px; border-top: 1px solid var(--border); flex-shrink: 0;
}
.btn-show-all {
  background: none; border: none; cursor: pointer; color: var(--text-muted);
  font-size: 11px; padding: 4px 6px; border-radius: 5px; transition: all .15s;
  width: 100%; text-align: left; white-space: nowrap;
}
.btn-show-all:hover { color: var(--text-dim); background: var(--surface2); }
.btn-show-all.on { color: var(--text-dim); }

/* ══════════════════════════════════════
   RIGHT BAR — chat mode only, 48px placeholder
   ══════════════════════════════════════ */
.right-bar {
  width: 48px; background: var(--surface); border-left: 1px solid var(--border);
  flex-shrink: 0;
}
body.canvas-mode .right-bar { display: none; }

/* ══════════════════════════════════════
   CHAT MODE main area
   ══════════════════════════════════════ */
.chat-main {
  flex: 1; display: flex; flex-direction: column; align-items: center; overflow: hidden;
}
body.canvas-mode .chat-main { display: none; }
.chat-main .messages {
  flex: 1; overflow-y: auto; width: 100%; max-width: 780px; padding: 24px 20px 8px;
  display: flex; flex-direction: column; gap: 16px;
}
.chat-main .footer { width: 100%; max-width: 780px; padding: 10px 20px 24px; }

/* ══════════════════════════════════════
   CANVAS MODE areas
   ══════════════════════════════════════ */
.canvas-area { flex: 1; background: var(--bg); display: none; overflow: hidden; position: relative; }
body.canvas-mode .canvas-area { display: flex; align-items: stretch; }

.chat-side {
  width: var(--chat-panel-w); background: var(--surface); border-left: 1px solid var(--border);
  display: none; flex-direction: column; flex-shrink: 0;
}
body.canvas-mode .chat-side { display: flex; }
.chat-side .side-header {
  padding: 12px 14px 10px; border-bottom: 1px solid var(--border); flex-shrink: 0;
}
.side-title { font-size: 13px; font-weight: 600; color: var(--text); }
.side-sub   { font-size: 11px; color: var(--text-dim); margin-top: 2px; }
.chat-side .messages {
  flex: 1; overflow-y: auto; padding: 0; display: flex; flex-direction: column;
}
.chat-side .footer { padding: 8px 10px 12px; border-top: 1px solid var(--border); flex-shrink: 0; }

/* ── Memory Manager Panel ── */
/* Plan D: 通用 AIPP canvas 挂载模式 — 隐藏所有 legacy 面板。
   legacy app-specific canvas CSS has been removed; AIPP-owned widgets ship
   their own UI modules. */
#aipp-canvas-mount { display: none; }
body.aipp-canvas-mode #aipp-canvas-mount { display: flex; flex: 1; min-width: 0; min-height: 0; align-self: stretch; }

/* App-specific widget styles are owned by their AIPP modules. */
.mem-type-bar {
  display: none;
}
/* ── Canvas 侧边：紧凑无头像消息布局 ── */
.chat-side .msg { flex-direction: column; gap: 0; }
.chat-side .msg-avatar { display: none; }
/* 用户问题：白色文本 + 底部分割线 */
.chat-side .msg.user .msg-bubble {
  background: none; color: #ffffff; border-radius: 0;
  border-bottom: 1px solid rgba(255,255,255,.1);
  padding: 10px 14px 11px; max-width: 100%; font-size: 12.5px; font-weight: 500;
}
/* AI 回答：白色文本，无气泡背景 */
.chat-side .msg.assistant .msg-bubble {
  background: none; color: var(--text); border-radius: 0;
  padding: 8px 14px 12px; max-width: 100%; font-size: 12.5px;
}
.chat-side .msg.system .msg-bubble { max-width: 100%; margin: 6px 10px; border-radius: 6px; }
/* canvas 侧边关闭 p 底部 margin，更紧凑 */
.chat-side .msg-bubble p { margin-bottom: 3px; }

/* ── Shared message styles ── */
.msg { display: flex; gap: 7px; align-items: flex-start; }
.msg.user { flex-direction: row-reverse; }
.msg-avatar {
  width: 26px; height: 26px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 10px; font-weight: 700; flex-shrink: 0; margin-top: 2px;
}
.msg.user      .msg-avatar { background: var(--accent); color: #fff; }
.msg.assistant .msg-avatar { background: var(--surface3); color: var(--text-dim); }
.msg.system    .msg-avatar { background: rgba(79,191,143,.15); color: var(--success); }
.msg-bubble { padding: 8px 12px; border-radius: 12px; font-size: 13px; line-height: 1.6; max-width: 520px; }
.chat-side .msg-bubble { max-width: 260px; font-size: 12px; }
.msg.user      .msg-bubble { background: var(--accent); color: #fff; border-bottom-right-radius: 4px; }
.msg.assistant .msg-bubble { background: var(--surface2); color: var(--text); border-bottom-left-radius: 4px; }
.msg.system    .msg-bubble { background: rgba(79,191,143,.06); border: 1px solid rgba(79,191,143,.15); color: var(--text-dim); font-size: 12px; }

/* ── Typing dots ── */
.typing-dot {
  display: inline-block; width: 6px; height: 6px; border-radius: 50%;
  background: var(--text-dim); animation: blink 1.2s infinite; margin: 0 2px;
}
.typing-dot:nth-child(2) { animation-delay: .2s; }
.typing-dot:nth-child(3) { animation-delay: .4s; }
@keyframes blink { 0%,80%,100%{opacity:.3} 40%{opacity:1} }

/* ── Input row ── */
.input-row { display: flex; gap: 7px; align-items: flex-end; }
.chat-input {
  flex: 1; background: var(--surface2); border: 1px solid var(--border2); border-radius: var(--radius);
  color: var(--text); font-size: 14px; padding: 10px 13px; resize: none; font-family: inherit;
  outline: none; min-height: 56px; max-height: 200px; transition: border-color .15s; line-height: 1.55;
}
/* canvas 侧边 chat 输入保持紧凑 */
.chat-side .chat-input { font-size: 13px; padding: 8px 10px; min-height: 36px; max-height: 120px; }
.chat-input:focus { border-color: var(--accent); }
.chat-input::placeholder { color: var(--text-muted); }
.chat-input:disabled {
  opacity: .45; cursor: not-allowed; border-color: var(--border);
}
/* Read-only session notice bar */
.readonly-notice {
  font-size: 11px; color: var(--text-muted); text-align: center;
  padding: 5px 10px; background: var(--surface); border-top: 1px solid var(--border);
  flex-shrink: 0; display: flex; align-items: center; justify-content: center; gap: 8px;
}
.readonly-delete-btn {
  background: none; border: 1px solid rgba(255,79,106,.3); border-radius: 4px;
  color: var(--danger); font-size: 11px; padding: 2px 8px; cursor: pointer; transition: all .1s;
}
.readonly-delete-btn:hover { background: rgba(255,79,106,.1); }

.btn-action {
  border: none; border-radius: var(--radius); width: 40px; height: 40px; cursor: pointer;
  display: flex; align-items: center; justify-content: center; flex-shrink: 0; transition: all .15s;
}
/* chat-main 中的按钮跟随输入框底部对齐 */
.chat-main .input-row { align-items: flex-end; }
.btn-action.send { background: var(--accent); color: #fff; }
.btn-action.send:hover:not(:disabled) { background: var(--accent-h); }
.btn-action.send:disabled { opacity: .4; cursor: default; }
.btn-action.stop { background: rgba(255,79,106,.15); border: 1px solid var(--danger); color: var(--danger); }
.btn-action.stop:hover { background: rgba(255,79,106,.28); }
.btn-action svg { width: 15px; height: 15px; fill: none; stroke: currentColor; stroke-width: 2; }
.btn-action.stop svg { width: 13px; height: 13px; fill: currentColor; stroke: none; }

/* ── Welcome hint ── */
.welcome-hint { text-align: center; padding: 52px 16px 24px; }
.welcome-hint h2 { font-size: 26px; font-weight: 300; color: var(--text-dim); margin-bottom: 10px; }
.welcome-hint p { font-size: 14px; color: var(--text-muted); margin-bottom: 20px; }
.hint-chips { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; }
.chip {
  background: var(--surface2); border: 1px solid var(--border2); border-radius: 20px;
  padding: 6px 14px; font-size: 12px; color: var(--text-dim); cursor: pointer; transition: all .15s;
}
.chip:hover { border-color: var(--accent); color: var(--accent); background: var(--accent-glow); }

/* ── AIPP sys.* Inline Card (in chat stream, canvas mode) ────────────── */
.sys-inline-card {
  background: var(--surface2); border: 1px solid var(--border2);
  border-radius: var(--radius); padding: 12px 14px;
  display: flex; flex-direction: column; gap: 8px;
  max-width: 340px;
}
.sys-inline-card.danger { border-color: rgba(255,79,106,.35); }
.sys-inline-title { font-size: 13px; font-weight: 600; color: var(--text); }
.sys-inline-message {
  font-size: 12px; color: var(--text-dim); line-height: 1.6;
  white-space: pre-wrap;
}
.sys-inline-buttons { display: flex; gap: 7px; margin-top: 2px; }
.sys-inline-btn {
  padding: 5px 14px; border-radius: var(--radius); border: none;
  font-size: 12px; font-weight: 500; cursor: pointer; transition: opacity .15s;
}
.sys-inline-btn:disabled { opacity: .4; cursor: default; }
.sys-inline-btn:hover:not(:disabled) { opacity: .85; }
.sys-inline-btn.primary   { background: var(--accent);  color: #fff; }
.sys-inline-btn.danger    { background: var(--danger);  color: #fff; }
.sys-inline-btn.secondary { background: var(--surface3); color: var(--text-dim); border: 1px solid var(--border); }
.sys-inline-done { font-size: 12px; color: var(--text-dim); font-style: italic; }
.runtime-card-meta {
  font-size: 11px; color: var(--text-dim); line-height: 1.6; white-space: pre-wrap;
}
.runtime-card-actions { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 2px; }

/* ── AIPP System Widget Modal (sys.confirm / sys.alert / sys.prompt) ── */
.sys-modal-overlay {
  display: none; position: fixed; inset: 0;
  background: rgba(0,0,0,.6); z-index: 2000;
  align-items: center; justify-content: center;
}
.sys-modal-overlay.open { display: flex; }
.sys-modal {
  background: var(--surface2); border: 1px solid var(--border2);
  border-radius: var(--radius-lg); padding: 24px 28px;
  min-width: 320px; max-width: 480px; width: 90%;
  box-shadow: 0 8px 40px rgba(0,0,0,.5);
  display: flex; flex-direction: column; gap: 14px;
}
.sys-modal-title {
  font-size: 15px; font-weight: 600; color: var(--text);
}
.sys-modal-message {
  font-size: 13px; color: var(--text-dim); line-height: 1.6;
  white-space: pre-wrap;
}
.sys-modal-input {
  background: var(--surface3); border: 1px solid var(--border2);
  border-radius: var(--radius); color: var(--text);
  padding: 8px 12px; font-size: 13px; outline: none; width: 100%;
  box-sizing: border-box;
}
.sys-modal-input:focus { border-color: var(--accent); }
.sys-modal-buttons {
  display: flex; gap: 8px; justify-content: flex-end; margin-top: 4px;
}
.sys-modal-btn {
  padding: 7px 18px; border-radius: var(--radius); border: none;
  font-size: 13px; font-weight: 500; cursor: pointer; transition: opacity .15s;
}
.sys-modal-btn:hover { opacity: .85; }
.sys-modal-btn.primary   { background: var(--accent);  color: #fff; }
.sys-modal-btn.danger    { background: var(--danger);  color: #fff; }
.sys-modal-btn.secondary { background: var(--surface3); color: var(--text-dim); border: 1px solid var(--border); }

/* ── Settings overlay ── */
.settings-overlay {
  display: none; position: fixed; inset: 0; background: rgba(0,0,0,.55);
  z-index: 100; align-items: flex-start; justify-content: flex-end;
}
.settings-overlay.open { display: flex; }
.settings-panel {
  width: 380px; height: 100%; background: var(--surface); border-left: 1px solid var(--border);
  display: flex; flex-direction: column; animation: slideIn .2s ease;
}
@keyframes slideIn { from { transform: translateX(40px); opacity:0 } to { transform:none; opacity:1 } }
.settings-header {
  padding: 16px 18px 14px; border-bottom: 1px solid var(--border);
  display: flex; align-items: center; justify-content: space-between;
}
.settings-title { font-size: 14px; font-weight: 700; color: var(--text); }
.btn-close-settings {
  background: none; border: none; color: var(--text-dim); cursor: pointer;
  font-size: 18px; line-height: 1; padding: 2px 6px; border-radius: 4px;
}
.btn-close-settings:hover { color: var(--text); background: var(--surface2); }
.settings-body { flex: 1; overflow-y: auto; padding: 20px 18px; display: flex; flex-direction: column; gap: 18px; }
.settings-section { font-size: 10px; font-weight: 700; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 10px; }
.form-group { display: flex; flex-direction: column; gap: 5px; margin-bottom: 12px; }
.form-label { font-size: 12px; color: var(--text-dim); font-weight: 500; }
.form-input {
  background: var(--surface2); border: 1px solid var(--border2); border-radius: var(--radius);
  color: var(--text); font-size: 13px; padding: 8px 11px; outline: none;
  font-family: inherit; width: 100%; transition: border-color .15s;
}
.form-input:focus { border-color: var(--accent); }
.form-input::placeholder { color: var(--text-muted); }
.form-hint { font-size: 11px; color: var(--text-muted); }
.form-select {
  background: var(--surface2); border: 1px solid var(--border2); border-radius: var(--radius);
  color: var(--text); font-size: 13px; padding: 8px 11px; outline: none;
  font-family: inherit; width: 100%; cursor: pointer;
}
.envvar-list { display: flex; flex-direction: column; gap: 10px; }
.envvar-row {
  border: 1px solid var(--border2);
  background: var(--surface2);
  border-radius: var(--radius);
  padding: 10px;
  display: flex;
  flex-direction: column;
  gap: 8px;
}
.envvar-head {
  display: grid;
  grid-template-columns: 1fr 1fr auto;
  gap: 8px;
  align-items: end;
}
.envvar-overrides { display: flex; flex-direction: column; gap: 6px; }
.envvar-override-item {
  display: grid;
  grid-template-columns: 1fr 1fr auto;
  gap: 8px;
  align-items: center;
}
.btn-inline {
  border: 1px solid var(--border2);
  background: var(--surface3);
  color: var(--text-dim);
  border-radius: 8px;
  font-size: 12px;
  line-height: 1;
  padding: 7px 9px;
  cursor: pointer;
}
.btn-inline:hover { color: var(--text); border-color: var(--accent); }
.btn-inline.danger:hover { color: var(--danger); border-color: var(--danger); }
.envvar-footer { display: flex; justify-content: space-between; align-items: center; gap: 8px; }
.envvar-empty { color: var(--text-muted); font-size: 12px; }
.settings-footer { padding: 14px 18px 18px; border-top: 1px solid var(--border); display: flex; gap: 8px; }

/* ── Apps Panel ───────────────────────────────────────────────────────── */
.apps-panel {
  position:fixed; left:52px; bottom:var(--apps-panel-bottom,54px); z-index:900;
  width:220px;
  max-height:calc(100vh - var(--apps-panel-bottom,54px) - 8px);
  background:var(--surface); border:1px solid var(--border);
  border-radius:var(--radius);
  display:flex; flex-direction:column; overflow:hidden;
  box-shadow:2px 4px 16px rgba(0,0,0,0.32);
  transform:translateX(calc(-100% - 4px));
  opacity:0; pointer-events:none;
  transition:transform 0.22s cubic-bezier(0.4,0,0.2,1), opacity 0.18s;
}
.apps-panel.open { transform:translateX(0); opacity:1; pointer-events:all; }
.apps-header { height:32px; display:flex; align-items:center; padding:0 12px; border-bottom:1px solid var(--border); flex-shrink:0; }
.apps-title { font-size:10px; font-weight:600; color:var(--text-muted); text-transform:uppercase; letter-spacing:.8px; }
.apps-body { flex:1; min-height:0; overflow-y:auto; }
@keyframes spin { to { transform:rotate(360deg); } }

/* ── HTML Widget (inline chat card, is_canvas_mode=false) ────────────── */
.html-widget-msg { padding:4px 0; }
.hw-spinner { width:20px; height:20px; border:2px solid var(--border2); border-top-color:var(--accent); border-radius:50%; animation:spin 0.7s linear infinite; }
.btn-primary {
  flex: 1; background: var(--accent); border: none; border-radius: var(--radius);
  color: #fff; font-size: 13px; font-weight: 600; padding: 9px; cursor: pointer; transition: background .15s;
}
.btn-primary:hover { background: var(--accent-h); }
.btn-secondary {
  background: var(--surface2); border: 1px solid var(--border2); border-radius: var(--radius);
  color: var(--text-dim); font-size: 13px; padding: 9px 14px; cursor: pointer; transition: all .15s; white-space: nowrap;
}
.btn-secondary:hover { color: var(--text); border-color: var(--text-dim); }
.test-result {
  padding: 8px 11px; border-radius: var(--radius); font-size: 12px; display: none; margin-top: 6px;
}
.test-result.ok   { background: rgba(100,200,100,.1); color: #7fbf7f; border: 1px solid rgba(100,200,100,.2); }
.test-result.fail { background: rgba(255,80,100,.1); color: #ff8090; border: 1px solid rgba(255,80,100,.2); }
.status-dot {
  width: 7px; height: 7px; border-radius: 50%; display: inline-block; margin-right: 6px; background: var(--text-muted);
}
.status-dot.ok   { background: #7fbf7f; box-shadow: 0 0 5px #7fbf7f88; }
.status-dot.fail { background: var(--danger); }

/* ── Thinking block（推理过程，可折叠，灰色） ── */
.thinking-block {
  margin-bottom: 5px; border-left: 2px solid var(--border2);
  padding: 3px 0 3px 8px;
}
.thinking-toggle {
  cursor: pointer; display: inline-flex; align-items: center; gap: 5px;
  color: var(--text-muted); font-size: 11px; user-select: none; background: none;
  border: none; padding: 0; font-family: inherit; transition: color .15s;
}
.thinking-toggle:hover { color: var(--text-dim); }
.thinking-toggle .th-chevron {
  flex-shrink: 0; transition: transform .2s;
}
.thinking-toggle.open .th-chevron { transform: rotate(90deg); }
.thinking-body {
  display: none; color: var(--text-dim); font-size: 11px; line-height: 1.5;
  margin-top: 4px; padding-right: 4px; overflow-wrap: break-word;
}
.thinking-body.visible { display: block; }
/* 主聊天区 thinking 块稍宽松 */
.full-messages .thinking-block { border-left-color: var(--accent); }
.full-messages .thinking-toggle { color: var(--text-dim); font-size: 11.5px; }

/* ── 实时进度指示器（live-progress 消息） ── */
/* 复用 .msg.assistant 结构，canvas 模式下无头像 */
.live-bubble {
  display: flex; flex-direction: column; gap: 5px;
  min-height: 28px;
}
/* 状态行：旋转 spinner + "处理中" label */
.lp-status {
  display: flex; align-items: center; gap: 6px;
  color: var(--text-muted); font-size: 11.5px;
}
.lp-spinner {
  width: 12px; height: 12px; border-radius: 50%; flex-shrink: 0;
  border: 1.5px solid var(--border2); border-top-color: var(--accent);
  animation: lp-spin .7s linear infinite;
}
@keyframes lp-spin { to { transform: rotate(360deg); } }
/* 工具调用 chip 容器 */
.lp-tools {
  display: flex; flex-wrap: wrap; gap: 4px;
}
.lp-tool-chip {
  display: inline-flex; align-items: center; gap: 3px;
  font-size: 10px; color: var(--text-dim);
  background: var(--surface3); border: 1px solid var(--border2);
  border-radius: 4px; padding: 2px 7px; white-space: nowrap;
  animation: chip-in .2s ease;
}
@keyframes chip-in { from { opacity:0; transform:scale(.85); } to { opacity:1; transform:scale(1); } }
.lp-tool-chip svg { color: var(--accent); flex-shrink: 0; }
/* AIPP 注解标签（在工具 chip 前展示，标识当前使用的 AIPP） */
.lp-aipp-badge {
  display: inline-flex; align-items: center; gap: 3px;
  font-size: 10px; color: var(--text-muted);
  border-radius: 4px; padding: 2px 6px; white-space: nowrap;
  letter-spacing: .3px; font-style: italic;
  animation: chip-in .2s ease;
}
.lp-aipp-badge svg { color: var(--text-muted); flex-shrink: 0; }
/* 思考预览区（推理模型专用，thinking 事件触发后显示） */
.lp-thinking-preview {
  display: none; color: var(--text-muted); font-size: 11px; line-height: 1.5;
  max-height: 80px; overflow-y: auto; padding-right: 2px;
  border-left: 2px solid var(--border2); padding-left: 7px;
}
.lp-thinking-preview.visible { display: block; }

/* 主聊天区 live-progress 使用标准气泡 */
.full-messages .msg.live-progress .msg-bubble {
  background: var(--surface2); border-bottom-left-radius: 4px;
}

/* ── 流式文本容器 ── */
.stream-text {
  /* Keep the same typography model as finalized markdown to avoid layout jump on done. */
  white-space: normal;
  line-height: inherit;
  word-break: break-word;
}
.stream-text.streaming::after {
  content: '▋'; color: var(--accent); animation: cur-blink .6s steps(1) infinite;
}
/* mid-tool 叙述（被工具调用打断的流式文本）→ 转为灰色 thinking 风格，最终答案到达时移除 */
.msg.assistant.thinking-roll .msg-bubble {
  background: transparent; border: none; padding: 4px 0;
}
.msg.assistant.thinking-roll .stream-text {
  color: var(--text-muted); font-size: 12px; font-style: italic; opacity: .85;
}
.msg.assistant.thinking-roll .stream-text::after { content: ''; }
@keyframes cur-blink { 50% { opacity: 0; } }

::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 4px; }

/* ── Message body wrapper + action icons ── */
.msg-body { display: flex; flex-direction: column; min-width: 0; }
.msg.user      .msg-body { align-items: flex-end; }
.msg.assistant .msg-body { align-items: flex-start; }
.msg-actions {
  display: flex; gap: 2px; opacity: 0; transition: opacity .12s;
  padding: 2px 0 0;
}
.msg:hover .msg-actions { opacity: 1; }
.msg-action-btn {
  display: flex; align-items: center; justify-content: center;
  width: 22px; height: 22px;
  background: none; border: none; cursor: pointer;
  color: var(--text-dim); border-radius: 4px;
  transition: background .1s, color .1s;
  padding: 0;
}
.msg-action-btn:hover { background: var(--surface3); color: var(--text); }
.msg-action-btn svg { pointer-events: none; }
.msg-edit-area {
  background: var(--surface2); border: 1px solid var(--border2); border-radius: 8px;
  padding: 6px 10px; color: var(--text); font-size: 13px; resize: none;
  min-width: 180px; max-width: 440px; outline: none; line-height: 1.5;
  font-family: inherit;
}
.msg-edit-area:focus { border-color: var(--accent); }
/* Widget 消息右上角删除按钮 */
.html-widget-msg { position: relative; }
.widget-actions {
  position: absolute; top: 6px; right: 6px;
  display: flex; gap: 2px; opacity: 0; transition: opacity .12s;
  z-index: 10;
}
.html-widget-msg:hover .widget-actions { opacity: 1; }
/* 已处理卡片 */
.widget-processed-msg .msg-body { padding: 0; }
.widget-processed-card {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 6px 12px; border-radius: 6px;
  background: var(--surface2); border: 1px solid var(--border);
  color: var(--text-dim); font-size: 12px;
}
.widget-processed-card svg { color: #4fbf8f; flex-shrink: 0; }

/* ── Markdown 渲染样式（assistant/system 气泡）── */
.msg-bubble p { margin: 0 0 6px; }
.msg-bubble p:last-child { margin-bottom: 0; }
.msg-bubble h1,.msg-bubble h2,.msg-bubble h3,.msg-bubble h4 {
  font-weight: 700; margin: 8px 0 3px; line-height: 1.35; color: var(--text);
}
.msg-bubble h1 { font-size: 1.15em; }
.msg-bubble h2 { font-size: 1.08em; }
.msg-bubble h3,.msg-bubble h4 { font-size: 1em; }
.msg-bubble ul,.msg-bubble ol { margin: 3px 0 5px 18px; }
.msg-bubble li { margin-bottom: 2px; }
.msg-bubble code {
  background: rgba(124,111,247,.15); color: #c5b4ff;
  padding: 1px 5px; border-radius: 4px; font-size: .87em;
  font-family: 'JetBrains Mono','Fira Code',monospace;
}
.msg-bubble pre {
  background: #0a0b10; border: 1px solid var(--border2); border-radius: 6px;
  padding: 10px 12px; margin: 6px 0; overflow-x: auto;
}
.msg-bubble pre code {
  background: none; color: #b4c8f0; padding: 0; font-size: .82em;
}
.msg-bubble blockquote {
  border-left: 3px solid var(--accent); margin: 5px 0;
  padding: 3px 10px; color: var(--text-dim);
  background: rgba(124,111,247,.06); border-radius: 0 4px 4px 0;
}
.msg-bubble hr { border: none; border-top: 1px solid var(--border2); margin: 7px 0; }
.msg-bubble table { border-collapse: collapse; margin: 5px 0; width: 100%; font-size: .88em; }
.msg-bubble th { background: var(--surface3); border: 1px solid var(--border2); padding: 4px 8px; text-align: left; }
.msg-bubble td { border: 1px solid var(--border2); padding: 3px 8px; }
.msg-bubble a { color: var(--accent-h); text-decoration: underline; }
/* user 气泡（紫底白字）覆盖 */
.msg.user .msg-bubble code { background: rgba(255,255,255,.18); color: #fff; }
.msg.user .msg-bubble pre  { background: rgba(0,0,0,.25); border-color: rgba(255,255,255,.2); }
.msg.user .msg-bubble pre code { color: #e8e4ff; }
.msg.user .msg-bubble blockquote { border-left-color: rgba(255,255,255,.5); color: rgba(255,255,255,.8); background: rgba(0,0,0,.15); }
.msg.user .msg-bubble th { background: rgba(0,0,0,.2); border-color: rgba(255,255,255,.18); }
.msg.user .msg-bubble td { border-color: rgba(255,255,255,.18); }
.msg.user .msg-bubble a  { color: #e0d8ff; }
</style>
<script src="/marked.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/monaco-editor@0.46.0/min/vs/loader.js"></script>
<script>
// 配置 marked：GFM + 换行符转 <br>
window.addEventListener('DOMContentLoaded', () => {
  if (typeof marked !== 'undefined') {
    marked.use({ gfm: true, breaks: true });
  }
});
</script>

<body>

<!-- Topbar -->
<div class="topbar">
  <div class="brand">World One</div>
  <div class="topbar-spacer"></div>
  <span class="mode-badge" id="mode-badge" data-i18n="mode.chat">Chat</span>
  <span class="canvas-session-label" id="canvas-session-label"></span>
  <button class="topbar-btn exit-canvas" onclick="exitToMainSession()">
    <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M18 6L6 18M6 6l12 12"/></svg>
    <span data-i18n="topbar.exitCanvas">退出图模式</span>
  </button>
</div>

<!-- sys.confirm / sys.alert / sys.prompt — AIPP System Widget Modal -->
<div class="sys-modal-overlay" id="sys-modal-overlay">
  <div class="sys-modal" id="sys-modal">
    <div class="sys-modal-title" id="sys-modal-title"></div>
    <div class="sys-modal-message" id="sys-modal-message"></div>
    <!-- sys.prompt input -->
    <input class="sys-modal-input" id="sys-modal-input" type="text" style="display:none" />
    <!-- buttons -->
    <div class="sys-modal-buttons" id="sys-modal-buttons"></div>
  </div>
</div>

<!-- Settings overlay -->
<div class="settings-overlay" id="settings-overlay" onclick="overlayClick(event)">
  <div class="settings-panel">
    <div class="settings-header">
      <span class="settings-title" data-i18n="settings.title">⚙ World One 设置</span>
      <button class="btn-close-settings" onclick="closeSettings()">×</button>
    </div>
    <form onsubmit="event.preventDefault(); saveSettings();">
    <div class="settings-body">
      <div>
        <div class="settings-section" data-i18n="settings.llmSection">LLM 连接</div>
        <div class="form-group">
          <label class="form-label" data-i18n="settings.provider">Provider 预设</label>
          <select class="form-select" id="s-provider" onchange="applyPreset()">
            <option value="deepseek">DeepSeek（推荐）</option>
            <option value="openai">OpenAI</option>
            <option value="custom">Custom / Local Ollama</option>
          </select>
        </div>
        <div class="form-group">
          <label class="form-label"><span data-i18n="settings.apiKey">API Key</span> <span style="color:var(--danger)">*</span></label>
          <input class="form-input" type="password" id="s-apikey" autocomplete="off">
          <span class="form-hint" data-i18n="settings.apiKeyHint">持久化到本地，不上传服务器</span>
        </div>
        <div class="form-group">
          <label class="form-label" data-i18n="settings.baseUrl">Base URL</label>
          <input class="form-input" type="text" id="s-baseurl" placeholder="https://api.deepseek.com/v1">
        </div>
        <div class="form-group">
          <label class="form-label" data-i18n="settings.model">Model</label>
          <input class="form-input" type="text" id="s-model" placeholder="deepseek-chat">
        </div>
        <div class="form-group" style="margin-bottom:4px">
          <label class="form-label" data-i18n="settings.timeout">Timeout（秒）</label>
          <input class="form-input" type="number" id="s-timeout" placeholder="120" min="10" max="600">
        </div>
        <div class="test-result" id="test-result"></div>
      </div>
      <div>
        <div class="settings-section" data-i18n="settings.statusSection">连接状态</div>
        <div style="font-size:12px;color:var(--text-dim);display:flex;align-items:center">
          <span class="status-dot" id="status-dot"></span>
          <span id="status-text" data-i18n="settings.notConfigured">API Key 未配置</span>
        </div>
      </div>
      <div>
        <div class="settings-section" data-i18n="settings.envSection">Host 环境变量</div>
        <span class="form-hint" data-i18n="settings.envHint">
          变量会自动注入到所有 AIPP 调用。若设置 app 覆盖值，将优先于全局值。
        </span>
        <div class="envvar-list" id="s-envvars-list"></div>
        <div class="envvar-footer">
          <span class="envvar-empty" id="s-envvars-empty" data-i18n="settings.envEmpty">尚未配置环境变量</span>
          <button type="button" class="btn-inline" onclick="addEnvVarRow()" data-i18n="settings.addEnvVar">+ 添加变量</button>
        </div>
      </div>
    </div>
    <div class="settings-footer">
      <button type="button" class="btn-secondary" id="btn-test" onclick="testConnection()" data-i18n="settings.testBtn">测试连接</button>
      <button type="submit" class="btn-primary" data-i18n="settings.saveBtn">保存</button>
    </div>
    </form>
  </div>
</div>

<!-- APPS PANEL (slides out from funcbar) -->
<div class="apps-panel" id="apps-panel">
  <div class="apps-header">
    <span class="apps-title" data-i18n="apps.title">应用</span>
  </div>
  <div class="apps-body" id="apps-body">
    <iframe id="apps-iframe"
            sandbox="allow-scripts allow-same-origin"
            style="width:100%;height:100%;border:none;display:block;"></iframe>
  </div>
</div>

<!-- Workspace -->
<div class="workspace">

  <!-- FUNCTION BAR (always visible 48px) -->
  <div class="funcbar" id="funcbar">
    <div class="funcbar-top">
      <!-- All -->
      <button class="fb-btn active" id="fb-all" onclick="onFuncbarClick('all')" data-i18n-title="panel.all">
        <svg viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7" rx="1.5"/><rect x="14" y="3" width="7" height="7" rx="1.5"/><rect x="3" y="14" width="7" height="7" rx="1.5"/><rect x="14" y="14" width="7" height="7" rx="1.5"/></svg>
      </button>
      <!-- Conversations -->
      <button class="fb-btn" id="fb-conversation" onclick="onFuncbarClick('conversation')" data-i18n-title="panel.conversations">
        <svg viewBox="0 0 24 24"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
      </button>
      <!-- Tasks -->
      <button class="fb-btn" id="fb-task" onclick="onFuncbarClick('task')" data-i18n-title="panel.tasks">
        <svg viewBox="0 0 24 24"><polyline points="9 11 12 14 22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg>
      </button>
      <!-- Events -->
      <button class="fb-btn" id="fb-event" onclick="onFuncbarClick('event')" data-i18n-title="panel.events">
        <svg viewBox="0 0 24 24"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg>
      </button>
    </div>
    <div class="funcbar-bottom">
      <div class="funcbar-sep"></div>
      <!-- Apps launcher -->
      <button class="fb-btn" id="fb-apps" onclick="toggleAppsPanel()" data-i18n-title="apps.title">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="3" width="6" height="6" rx="1"/><rect x="15" y="3" width="6" height="6" rx="1"/>
          <rect x="3" y="15" width="6" height="6" rx="1"/><rect x="15" y="15" width="6" height="6" rx="1"/>
        </svg>

// ─── Session Data Model ───────────────────────────────────────────────────────
const sessionData = {
  'main': {
    id: 'main', type: 'conversation', name: 'World One',
    status: null, messages: [],
    canvasMode: false,
    showWelcome: true,
  }
};

let currentSessionId      = 'main';
let isCanvasMode          = false;
let panelOpen             = true;
let panelOpenBeforeCanvas = true;
let activeCategory        = 'all';
let _completedPageInit    = false; // placeholder, actual state is _completedPage above
let abortController       = null;
let isStreaming            = false;

// ─── Init: load sessions from backend ────────────────────────────────────────
async function loadSessions() {
  try {
    const data = await fetch('/api/sessions?all=true').then(r => r.json());
    const allSessions = [...(data.sessions || []), ...(data.app_sessions || [])];
    allSessions.forEach(s => {
      // conversation type sessions (main) never auto-enter canvas mode
      const isConversation = s.type === 'conversation';
      const isApp          = s.type === 'app';
      const canvasMode = !isConversation && !isApp && !!s.widgetType;

      if (!sessionData[s.id]) {
        sessionData[s.id] = {
          id: s.id, type: s.type, name: s.name, status: s.status,
          messages: [], canvasMode,
          widgetType: (isConversation || isApp) ? null : (s.widgetType || null),
          canvasSessionId: (isConversation || isApp) ? null : (s.canvasSessionId || null),
          showWelcome: false,
        };
      } else {
        sessionData[s.id].name            = s.name;
        sessionData[s.id].status          = s.status;
        sessionData[s.id].type            = s.type;
        // 仅在本地 canvasMode 未激活时，从服务端同步 canvas 状态（避免覆盖当前激活状态）
        if (!sessionData[s.id].canvasMode && !isConversation && !isApp) {
          sessionData[s.id].widgetType      = s.widgetType || null;
          sessionData[s.id].canvasSessionId = s.canvasSessionId || null;
          sessionData[s.id].canvasMode      = !!s.widgetType;
        }
      }
    });
  } catch(e) {}
  renderSessions();
}

// ─── FuncBar ─────────────────────────────────────────────────────────────────

function updatePanelTitle() {
