// 从 Apps 面板直接打开 app（绕过 LLM，调用 /api/apps/{appId}/open）
// toolName/toolArgs 可选：直接调用指定 skill（如点击世界卡片进入世界），与 LLM 路径一致
async function openAppDirect(appId, toolName, toolArgs, existingSessionId) {
  // widget submit 前，将当前活跃 widget 对应的 conversation message 标记为已处理。
  // 此时 currentSessionId 仍是源 session（主 session），需在调用工具前执行。
  await markActiveWidgetProcessed();

  // App panel 是全局导航：若当前在 canvas mode，先退回主 session
  if (isCanvasMode) exitCanvasMode();

  // App-owned tool openings will emit session/canvas events; pre-switching here
  // would mount stale canvas once before the real open response arrives.
  if (toolName) {
    // Widget submit should keep the response in the conversation that hosted the widget.
    // Switching to app-{appId} here hides the follow-up html_widget from the user.
  } else if (existingSessionId && sessionData[existingSessionId] && currentSessionId !== existingSessionId) {
    await switchSession(existingSessionId);
  } else {
    // 若 app 已有专属 session（app-{appId}），先切换过去，避免 spinner 污染当前 session
    const appSessionId = 'app-' + appId;
    if (sessionData[appSessionId] && currentSessionId !== appSessionId) {
      await switchSession(appSessionId);
    }
  }

  const uiSessionId = currentSessionId || 'main';
  // Show a "opening..." indicator in the (now correct) session
  const msgDiv = addMessage('assistant', '');
  const spinner = document.createElement('div');
  spinner.style.cssText = 'display:flex;align-items:center;gap:8px;color:var(--text-dim);font-size:13px;padding:4px 0';
  spinner.innerHTML = '<div class="hw-spinner"></div><span>正在打开…</span>';
  msgDiv.appendChild(spinner);
  scrollToBottom();

  try {
    // 传入 existingSessionId（若有）让 backend 使用对应世界的 agent loop
    const reqBody = {};
    if (toolName) { reqBody.tool_name = toolName; reqBody.tool_args = toolArgs || {}; }
    reqBody.session_id = existingSessionId || uiSessionId;
    const resp = await fetch(`/api/apps/${appId}/open`, {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify(reqBody)
    });
    if (!resp.ok) throw new Error(resp.statusText);
    const reader = resp.body.getReader();
    const dec    = new TextDecoder();
    let sseBuffer = '';
    msgDiv.removeChild(spinner);
    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      sseBuffer += dec.decode(value, { stream: true });
      const lines = sseBuffer.split('\n');
      sseBuffer = lines.pop(); // keep incomplete last line
      for (const line of lines) {
        if (!line.startsWith('data:')) continue;
        try { handleSseEvent(JSON.parse(line.slice(5).trim()), msgDiv); } catch(e) {}
      }
    }
    // flush any remaining buffered line
    if (sseBuffer.startsWith('data:')) {
      try { handleSseEvent(JSON.parse(sseBuffer.slice(5).trim()), msgDiv); } catch(e) {}
    }
    // Remove the placeholder msg if it ended up empty
    if (!msgDiv.textContent.trim() && !msgDiv.querySelector('iframe')) {
      msgDiv.remove();
      // Also remove from sessionData to avoid stale messages
      const prevSess = sessionData[uiSessionId];
      if (prevSess && prevSess.messages && prevSess.messages.length > 0) {
        prevSess.messages.pop();
      }
    }
  } catch(e) {
    spinner.innerHTML = '<span style="color:var(--danger)">打开失败：' + e.message + '</span>';
  }
}

// 处理 Host 系统面板 iframe 发来的 postMessage（AIPP widgets 使用 hostApi）
window.addEventListener('message', function(event) {
  if (!event.data) return;

  // ── app list widget：点击应用卡片 ──────────────────────────────────────
  if (event.data.type === 'openApp') {
    const { appId } = event.data;
    if (!appId) return;
    closeAppsPanel();           // panel 模式下关闭面板（chat 模式下安全忽略）
    _currentAppId = appId;
    openAppDirect(appId);
    return;
  }

  // ── app list widget：iframe 上报内容高度，精确调整 panel 尺寸 ─────────
  if (event.data.type === 'appListHeight') {
    const panel  = document.getElementById('apps-panel');
    const iframe = document.getElementById('apps-iframe');
    if (!panel || !iframe) return;
    const bottomPx   = parseFloat(panel.style.getPropertyValue('--apps-panel-bottom')) || 54;
    const headerH    = 34;   // .apps-header 32px + 1px border
    const maxPanelH  = window.innerHeight - bottomPx - 8;
    const contentH   = event.data.height || 0;
    const idealH     = contentH + headerH;
    const finalH     = Math.min(idealH, maxPanelH);
    panel.style.height  = finalH + 'px';
    iframe.style.height = (finalH - headerH) + 'px';
    return;
  }

});

/** 当前活跃 app（点击 Apps 面板时设置，用于 hostApi fallback） */
let _currentAppId = null;

// ── html_widget 渲染（is_canvas_mode=false）────────────────────────────────

/** 当前最后一条 html_widget 消息元素（用于 replace-last 逻辑）。 */
let _lastHtmlWidgetEl = null;

// ── Plan D：通用 widget 挂载（ESM）─────────────────────────────────────────
//
// AIPP 把 widget 实现成 ES module，export { mount(targetEl, hostApi, data) }。
// host 不知道任何 widget 的内部细节，只负责：
//   1. 从 _widgetManifests[widget_type].render.url 解析模块 URL
//      （由 WidgetsEndpoint enrich 时附带的 app_base_url 解析为绝对地址）
//   2. dynamic import 模块
//   3. 构造 hostApi（callTool 等），调 mod.mount
// 详见 aipp-protocol README §10.x — Widget Mount。

/** 给 widget 提供的 host 能力。最小集，按需扩展。 */
function makeHostApi({ widgetType, mountEl }) {
  const manifest = _widgetManifests[widgetType] || {};
  const appId = manifest.app_id || _currentAppId || '';
  const callTool = (name, args) => {
    const targetAppId = appId || _currentAppId;
    // 复用现有 session-切换 + openAppDirect 逻辑
    let existingUiSessionId = null;
    if (args && args.session_id) {
      const found = Object.values(sessionData).find(s => s.canvasSessionId === args.session_id);
      if (found) existingUiSessionId = found.id;
    }
    return openAppDirect(targetAppId, name, args || {}, existingUiSessionId);
  };
  return {
    /** 直接调用某 tool（绕开 LLM），用于 widget 内用户动作。 */
    callTool,
    async invokeAction(action, payload) {
      if (!action || typeof action !== 'object') {
        throw new Error('invalid submit action');
      }
      const kind = String(action.kind || '').toLowerCase();
      if (kind === 'world_event_submit') {
        const eventId = String(action.event_id || payload?.event?.id || '').trim();
        if (!eventId) throw new Error('event_id is required for world_event_submit');
        const resp = await fetch(`/api/world-events/${encodeURIComponent(eventId)}/submit`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ parameters: payload?.parameters || {} })
        });
        const body = await resp.json();
        if (!resp.ok) {
          return Object.assign({ status: 'failed', error: body?.error || body?.reason || 'submit failed' }, body || {});
        }
        const widgets = [body?.pre_widget, body?.widget || body?.resume_result?.html_widget, body?.final_widget]
          .filter(Boolean);
        return Object.assign({}, body, { widgets });
      }
      if (kind === 'tool') {
        const name = String(action.name || '').trim();
        if (!name) throw new Error('tool action requires name');
        const baseArgs = action.args && typeof action.args === 'object' ? Object.assign({}, action.args) : {};
        const merged = Object.assign(baseArgs, action.parameters_patch && typeof action.parameters_patch === 'object'
          ? action.parameters_patch
          : {});
        if (payload?.parameters && typeof payload.parameters === 'object') {
          merged.parameters = Object.assign({}, merged.parameters || {}, payload.parameters);
        }
        await callTool(name, merged);
        return { status: 'success', widgets: [] };
      }
      throw new Error('unsupported action kind: ' + (action.kind || 'unknown'));
    },
    openApp(targetAppId) {
      return openAppDirect(targetAppId);
    },
    markProcessed() {
      return markActiveWidgetProcessed();
    },
    markProcessedWithData(payload) {
      return markActiveWidgetProcessed(payload || {});
    },
    appendWidget(widgetPayload) {
      const el = addMessage('assistant', '');
      el.innerHTML = '';
      el.className = 'msg assistant';
      const json = typeof widgetPayload === 'string' ? widgetPayload : JSON.stringify(widgetPayload || {});
      renderHtmlWidget(json, el);
      const sess = sessionData[currentSessionId];
      if (sess && sess.messages) {
        const widgetMsg = { role: 'assistant', widgetJson: json, processed: el.dataset.processed === 'true' };
        if (sess.messages.length > 0) sess.messages[sess.messages.length - 1] = widgetMsg;
        else sess.messages.push(widgetMsg);
      }
      fetch(`/api/sessions/${currentSessionId}/messages/client`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ role: 'widget', widgetJson: json })
      }).catch(() => {});
      return Promise.resolve();
    },
    /** 直接 POST tool 到 AIPP（经 host /api/proxy 转发），返回 JSON。不触发任何 UI 转换。 */
    async proxyTool(name, args) {
      const ctx = { userId: 'default', sessionId: currentSessionId, agentId: 'worldone' };
      const r = await fetch(`/api/proxy/tools/${name}`, {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ args: args || {}, _context: ctx }),
      });
      return r.json();
    },
    widgetType,
    appId,
    appBaseUrl: manifest.app_base_url || '',
    appProxyUrl(path) {
      const suffix = String(path || '').startsWith('/') ? path : '/' + path;
      return appId ? `/api/proxy/app/${encodeURIComponent(appId)}${suffix}` : suffix;
    },
    mountEl,
    sessionId: currentSessionId,
  };
}

/** 解析 widget manifest 的 render.url 为可 import 的绝对 URL。 */
function _resolveWidgetUrl(manifest) {
  const url = manifest?.render?.url;
  if (!url) return null;
  const rev = '20260521-memory-manager-reload';
  const withRev = (u) => u.includes('?') ? `${u}&v=${rev}` : `${u}?v=${rev}`;
  if (/^https?:\/\//.test(url)) return withRev(url);
  const base = (manifest.app_base_url || '').replace(/\/$/, '');
  return withRev(base + (url.startsWith('/') ? url : '/' + url));
}

/**
 * 确保 canvas-area 内有 Plan-D 通用挂载容器；返回该 element。
 * Creates the generic Plan-D mount target inside .canvas-area.
 */
function _ensureAippCanvasMount() {
  let el = document.getElementById('aipp-canvas-mount');
  if (!el) {
    el = document.createElement('div');
    el.id = 'aipp-canvas-mount';
    el.style.cssText = 'flex:1;min-width:0;height:100%;overflow:auto;background:var(--bg);';
    const canvas = document.querySelector('.canvas-area');
    if (canvas) canvas.appendChild(el);
  }
  el.style.display = 'block';
  return el;
}

function _unmountAippCanvasMount() {
  const el = document.getElementById('aipp-canvas-mount');
  if (!el) return;
  if (el._aippWidgetMod && typeof el._aippWidgetMod.unmount === 'function') {
    try { el._aippWidgetMod.unmount(); } catch (_) {}
    el._aippWidgetMod = null;
  }
  el.innerHTML = '';
  el.style.display = 'none';
}

/** 通用挂载入口。被 renderHtmlWidget 检测到新 shape 时调用，也可被 canvas mode 复用。 */
const _aippWidgetModuleCache = new Map();

function preloadAippWidget(widgetType) {
  const manifest = _widgetManifests[widgetType];
  const url = _resolveWidgetUrl(manifest);
  if (!url || _aippWidgetModuleCache.has(url)) return;
  _aippWidgetModuleCache.set(url, import(/* @vite-ignore */ url).catch(e => {
    _aippWidgetModuleCache.delete(url);
    console.warn('[preloadAippWidget] failed', widgetType, e);
    return null;
  }));
}

function preloadCanvasWidgetsSoon() {
  const run = () => Object.values(_widgetManifests)
    .filter(w => w && w.is_canvas_mode && w.render && w.render.url)
    .forEach(w => preloadAippWidget(w.type));
  if ('requestIdleCallback' in window) requestIdleCallback(run, { timeout: 1500 });
  else setTimeout(run, 300);
}

async function mountAippWidget(targetEl, widgetType, data) {
  const manifest = _widgetManifests[widgetType];
  const url = _resolveWidgetUrl(manifest);
  console.log('[AIPP_ROUTE] step=widget_mount_start widget=%s url=%s data=', widgetType, url, data);
  if (!url) {
    targetEl.innerHTML = `<div style="color:#f88;font:13px monospace;padding:12px">`
      + `widget "${widgetType}" missing render.url in manifest</div>`;
    return;
  }
  // unmount previous widget instance if same target
  if (targetEl._aippWidgetMod && typeof targetEl._aippWidgetMod.unmount === 'function') {
    try { targetEl._aippWidgetMod.unmount(); } catch (_) {}
  }
  try {
    let modulePromise = _aippWidgetModuleCache.get(url);
    if (!modulePromise) {
      modulePromise = import(/* @vite-ignore */ url);
      _aippWidgetModuleCache.set(url, modulePromise);
    }
    const mod = await modulePromise;
    if (!mod) throw new Error('widget module preload failed');
    const api = makeHostApi({ widgetType, mountEl: targetEl });
    mod.mount(targetEl, api, data);
    const runtime = {
      mod,
      widgetType,
      data: data || {},
      hostApi: api,
      mountEl: targetEl,
      load: typeof mod.load === 'function' ? mod.load.bind(mod) : _defaultWidgetLoad,
      generate: typeof mod.generate === 'function' ? mod.generate.bind(mod) : _defaultWidgetGenerate,
    };
    targetEl._aippWidgetRuntime = runtime;
    const initialState = _normalizeWidgetState(runtime.data?.__widget_state);
    if (initialState) {
      try { await runtime.load(targetEl, initialState, runtime.data); } catch (_) {}
    }
    targetEl._aippWidgetMod = mod;
    console.log('[AIPP_ROUTE] step=widget_mount_done widget=%s url=%s', widgetType, url);
  } catch (e) {
    console.error('[mountAippWidget] failed', widgetType, url, e);
    targetEl.innerHTML = `<div style="color:#f88;font:13px monospace;padding:12px">`
      + `Failed to load widget "${widgetType}": ${e.message}</div>`;
  }
}

async function _collectActiveWidgetState(containerEl, explicitState) {
  const normalized = _normalizeWidgetState(explicitState);
  if (normalized) return normalized;
  const mountEl = containerEl?.querySelector?.('.aipp-widget-mount');
  const runtime = mountEl?._aippWidgetRuntime;
  if (!runtime || typeof runtime.generate !== 'function') return null;
  try {
    const generated = await runtime.generate(runtime.mountEl || mountEl, runtime.data || {});
    return _normalizeWidgetState(generated);
  } catch (_) {
    return null;
  }
}

function _defaultWidgetGenerate(rootEl) {
  const container = rootEl || document;
  const fields = Array.from(container.querySelectorAll('[data-param]'));
  if (!fields.length) return {};
  const out = {};
  let hasValue = false;
  fields.forEach(el => {
    const path = String(el.getAttribute('data-param') || '').trim();
    if (!path) return;
    const raw = _readFieldValue(el);
    if (raw === '') return;
    _setNestedByPath(out, path, raw);
    hasValue = true;
  });
  return hasValue ? out : {};
}

function _defaultWidgetLoad(rootEl, state) {
  const normalized = _normalizeWidgetState(state);
  if (!normalized || !rootEl) return;
  const fields = Array.from(rootEl.querySelectorAll('[data-param]'));
  fields.forEach(el => {
    const path = String(el.getAttribute('data-param') || '').trim();
    if (!path) return;
    const value = _readByPath(normalized, path);
    if (value == null || typeof value === 'object') return;
    if (el.type === 'checkbox') {
      el.checked = value === true || String(value).toLowerCase() === 'true';
    } else {
      el.value = String(value);
    }
  });
}

function _readFieldValue(el) {
  if (!el) return '';
  if (el.type === 'checkbox') return el.checked ? 'true' : '';
  return String(el.value ?? '').trim();
}

function _setNestedByPath(target, path, value) {
  const parts = String(path || '').split('.').filter(Boolean);
  if (!parts.length) return;
  let cur = target;
  for (let i = 0; i < parts.length - 1; i++) {
    const k = parts[i];
    if (!cur[k] || typeof cur[k] !== 'object') cur[k] = {};
    cur = cur[k];
  }
  cur[parts[parts.length - 1]] = value;
}

function _readByPath(source, path) {
  const parts = String(path || '').split('.').filter(Boolean);
  let cur = source;
  for (const p of parts) {
    if (cur == null || typeof cur !== 'object') return undefined;
    cur = cur[p];
  }
  return cur;
}

function renderHtmlWidget(json, containerMsgEl) {
  let data;
  try { data = typeof json === 'string' ? JSON.parse(json) : json; } catch(e) { return; }

  if (data && data.widget_type) {
    console.log('[AIPP_ROUTE] step=html_widget_received widget=%s title=%s data=', data.widget_type, data.title || '', data.data || {});
    return _renderAippWidgetMessage(data, containerMsgEl);
  }

  const errorEl = document.createElement('div');
  errorEl.className = 'widget-processed-card';
  errorEl.style.color = 'var(--danger)';
  errorEl.textContent = 'Invalid html_widget: missing widget_type for app-owned ESM renderer.';
  containerMsgEl.classList.add('html-widget-msg');
  containerMsgEl.appendChild(errorEl);
  _injectWidgetActions(containerMsgEl);
  containerMsgEl.dataset.widgetJson = typeof json === 'string' ? json : JSON.stringify(json);
  delete containerMsgEl.dataset.processed;
  _lastHtmlWidgetEl = containerMsgEl;
  _lastHtmlWidgetSessionId = currentSessionId;
  scrollToBottom();
}

/**
 * Plan D 聊天卡片挂载：在消息元素里建一个 mount 目标 div，调通用 mountAippWidget。
 * widget JS 直接渲染到 host DOM；Host 不理解 widget 内部 UI。
 */
function _renderAippWidgetMessage(data, containerMsgEl) {
  const widgetType = data.widget_type;
  const widgetData = data.data || {};

  // replace-last：同一条消息上重复挂载就更新内容
  let mountEl;
  const bubble = _ensureAssistantWidgetBubble(containerMsgEl);
  if (_lastHtmlWidgetEl && _lastHtmlWidgetEl === containerMsgEl) {
    mountEl = bubble.querySelector('.aipp-widget-mount');
    if (mountEl) {
      mountAippWidget(mountEl, widgetType, widgetData);
      containerMsgEl.dataset.widgetJson = typeof data === 'string' ? data : JSON.stringify(data);
      delete containerMsgEl.dataset.processed;
      return;
    }
  }

  mountEl = document.createElement('div');
  mountEl.className = 'aipp-widget-mount';
  containerMsgEl.classList.add('html-widget-msg');
  bubble.innerHTML = '';
  bubble.appendChild(mountEl);

  _injectWidgetActions(containerMsgEl);
  containerMsgEl.dataset.widgetJson = typeof data === 'string' ? data : JSON.stringify(data);
  delete containerMsgEl.dataset.processed;

  mountAippWidget(mountEl, widgetType, widgetData);
  _lastHtmlWidgetEl = containerMsgEl;
  _lastHtmlWidgetSessionId = currentSessionId;
  scrollToBottom();
}

function _ensureAssistantWidgetBubble(containerMsgEl) {
  containerMsgEl.classList.remove('live-progress');
  containerMsgEl.classList.add('msg', 'assistant', 'html-widget-msg');

  let avatar = containerMsgEl.querySelector(':scope > .msg-avatar');
  let body = containerMsgEl.querySelector(':scope > .msg-body');
  let bubble = body?.querySelector(':scope > .msg-bubble');
  if (avatar && body && bubble) return bubble;

  avatar = avatar || document.createElement('div');
  avatar.className = 'msg-avatar';
  avatar.textContent = avatar.textContent || 'W';

  body = document.createElement('div');
  body.className = 'msg-body';
  bubble = document.createElement('div');
  bubble.className = 'msg-bubble';
  body.appendChild(bubble);

  containerMsgEl.innerHTML = '';
  containerMsgEl.appendChild(avatar);
  containerMsgEl.appendChild(body);
  return bubble;
}

/**
 * 从 widgetJson 中提取可读标题，用于"已处理"卡片的定语。
 * 使用 json.title 字段。
 */
function _extractWidgetTitle(widgetJson) {
  try {
    const data = typeof widgetJson === 'string' ? JSON.parse(widgetJson) : widgetJson;
    if (data.title) return data.title;
  } catch (e) {}
  return '';
}

function _widgetEventId(widgetJson) {
  try {
    const root = typeof widgetJson === 'string' ? JSON.parse(widgetJson) : widgetJson;
    return root?.data?.event?.id || '';
  } catch (_) {
    return '';
  }
}

function _normalizedConversationMessages(messages) {
  if (!Array.isArray(messages) || messages.length <= 1) return messages || [];
  const winner = new Map();
  messages.forEach((m, idx) => {
    if (!m || !m.widgetJson) return;
    const eventId = _widgetEventId(m.widgetJson);
    if (!eventId) return;
    const prev = winner.get(eventId);
    if (!prev) {
      winner.set(eventId, { idx, score: _widgetReplayScore(m), hasProvided: _hasProvidedParameters(m) });
      return;
    }
    const score = _widgetReplayScore(m);
    const hasProvided = _hasProvidedParameters(m);
    // Prefer replay-safe message first:
    // 1) processed/readonly/submitted
    // 2) contains provided parameters
    // 3) latest index as tie-breaker
    if (score > prev.score
      || (score === prev.score && Number(hasProvided) > Number(prev.hasProvided))
      || (score === prev.score && hasProvided === prev.hasProvided && idx > prev.idx)) {
      winner.set(eventId, { idx, score, hasProvided });
    }
  });
  return messages.filter((m, idx) => {
    if (!m || !m.widgetJson) return true;
    const eventId = _widgetEventId(m.widgetJson);
    if (!eventId) return true;
    return winner.get(eventId)?.idx === idx;
  });
}

function _widgetReplayScore(msg) {
  if (!msg || !msg.widgetJson) return 0;
  if (msg.processed) return 3;
  if (_isReadonlyWidgetJson(msg.widgetJson)) return 2;
  return 1;
}

function _hasProvidedParameters(msg) {
  try {
    const root = typeof msg?.widgetJson === 'string' ? JSON.parse(msg.widgetJson) : (msg?.widgetJson || {});
    const event = root?.data?.event || {};
    const business = event?.business_data || {};
    const provided = business?.provided_parameters || business?.resume_args?.parameters;
    return !!(provided && typeof provided === 'object' && Object.keys(provided).length > 0);
  } catch (_) {
    return false;
  }
}

function _findWidgetMessageIndex(sess, sourceWidgetJson) {
  if (!sess || !Array.isArray(sess.messages) || !sourceWidgetJson) return -1;
  for (let i = sess.messages.length - 1; i >= 0; i--) {
    const msg = sess.messages[i];
    if (!msg || !msg.widgetJson || msg.processed) continue;
    if (msg.widgetJson === sourceWidgetJson) return i;
  }
  const sourceEventId = _widgetEventId(sourceWidgetJson);
  if (sourceEventId) {
    for (let i = sess.messages.length - 1; i >= 0; i--) {
      const msg = sess.messages[i];
      if (!msg || !msg.widgetJson || msg.processed) continue;
      if (_widgetEventId(msg.widgetJson) === sourceEventId) return i;
    }
  }
  return -1;
}

/**
 * 构建"已处理"静态卡片，用于 widget 触发 canvas 切换后返回主 session 时显示。
 * 不再渲染 widget，只显示一个轻量提示条。
 */
function _buildProcessedCard(widgetJson) {

  const el = document.createElement('div');

/**
 * 当用户通过 widget 触发 canvas 跳转时，将当前 session 中最后一个 widget 标记为"已处理"。
 * 跳转前调用（此时 currentSessionId 仍是源 session）。
 */
let _lastHtmlWidgetSessionId = null; // 记录 widget 所属的 session
async function markActiveWidgetProcessed(options = {}) {
  if (!_lastHtmlWidgetEl || !_lastHtmlWidgetSessionId) return;
  const sid = _lastHtmlWidgetSessionId;
  const sess = sessionData[sid];
  const sourceWidgetJson = _lastHtmlWidgetEl.dataset.widgetJson || '';
  const widgetState = await _collectActiveWidgetState(_lastHtmlWidgetEl, options?.widgetState);
  const readonlyWidgetJson = _toReadonlyWidgetJson(sourceWidgetJson, {
    providedParameters: options?.providedParameters,
    widgetState
  });
  const idx = _findWidgetMessageIndex(sess, sourceWidgetJson);
  let persistedByPatch = false;
  if (sess && sess.messages) {
    if (idx >= 0 && sess.messages[idx] && sess.messages[idx].widgetJson) {
      sess.messages[idx].widgetJson = readonlyWidgetJson;
      sess.messages[idx].processed = true;
      persistedByPatch = true;
    } else {
      // Fallback: keep conversation-level submitted artifact even when index
      // mapping fails (e.g. stale local order). Refresh path dedupes by event id.
      sess.messages.push({ role: 'assistant', widgetJson: readonlyWidgetJson, processed: true });
    }
  }
  // processed 是 conversation message state；按消息 index 更新，不修改 widget JSON。
  let patchOk = false;
  if (idx >= 0) {
    try {
      const r = await fetch(`/api/sessions/${sid}/messages/${idx}/state`, {
        method: 'PATCH',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ processed: true, widget_json: readonlyWidgetJson })
      });
      const body = await r.json().catch(() => ({}));
      patchOk = r.ok && body && body.ok === true;
    } catch (_) {
      patchOk = false;
    }
  }
  if (!persistedByPatch || !patchOk) {
    fetch(`/api/sessions/${sid}/messages/client`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ role: 'widget', widgetJson: readonlyWidgetJson })
    }).catch(() => {});
  }
  // 立即更新 DOM（如果还在当前视图）：保留原 widget，仅切只读态。
  _applyReadonlyWidgetState(_lastHtmlWidgetEl, readonlyWidgetJson);
  _lastHtmlWidgetEl = null;
  _lastHtmlWidgetSessionId = null;
}

/** 将活跃 widget 容器切为只读态（保持原卡片，不改成勾选提示）。 */
function _applyReadonlyWidgetState(el, readonlyWidgetJson) {
  if (!el) return;
  const json = readonlyWidgetJson || el.dataset.widgetJson || '';
  el.innerHTML = '';
  el.className = 'msg assistant';
  renderHtmlWidget(json, el);
  el.dataset.widgetJson = json;
  el.dataset.processed = 'true';
}

/** 在 widget 容器右上角注入删除按钮（若尚未注入）。 */
function _injectWidgetActions(containerMsgEl) {
  if (containerMsgEl.querySelector('.widget-actions')) return; // 幂等
  const icoTrash = `<svg viewBox="0 0 14 14" width="13" height="13" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"><path d="M2 3.5h10M5.5 3.5V2.5a.5.5 0 01.5-.5h2a.5.5 0 01.5.5v1M5.5 6v4.5M8.5 6v4.5M3 3.5l.7 7.2a.5.5 0 00.5.3h5.6a.5.5 0 00.5-.3L11 3.5"/></svg>`;
  const bar = document.createElement('div');
  bar.className = 'widget-actions';
  bar.innerHTML = `<button class="msg-action-btn" title="删除" onclick="msgDeleteWidget(this)">${icoTrash}</button>`;
  containerMsgEl.appendChild(bar);
}

/** 删除整个 widget 消息。 */
function msgDeleteWidget(btn) {
  if (isStreaming) return;
  const el = btn.closest('.msg');
  if (!el) return;
  const idx = _removeFromSession(el);
  el.remove();
  // widget 不在 DB 里，range 接口调用无害（服务端找不到会静默忽略）
  if (idx >= 0) {
    fetch(`/api/sessions/${currentSessionId}/messages/range?from=${idx}&count=1`,
      { method: 'DELETE' }).catch(() => {});
  }
}

function readEnvVarsFromUi() {
  const rows = [];
  document.querySelectorAll('#s-envvars-list .envvar-row').forEach(rowEl => {
    const key = rowEl.querySelector('.envvar-key')?.value?.trim() || '';
    if (!key) return;
    const globalValue = rowEl.querySelector('.envvar-global')?.value?.trim() || '';
    const appValues = {};
    rowEl.querySelectorAll('.envvar-override-item').forEach(item => {
      const appId = item.querySelector('.envvar-app')?.value?.trim() || '';

      if (appId && value) appValues[appId] = value;

    rows.push({ key, globalValue, appValues });
  });
  return rows;
}

    showTestResult(res.ok, res.message);
    updateStatusDot(res.ok); updateSettingsBtn(res.ok);
  } catch(e) { showTestResult(false, t('error.connect') + e.message); }
  btn.textContent = t('settings.testBtn'); btn.disabled = false;
}

function settingsBody() {
  return {
    apiKey:         document.getElementById('s-apikey').value.trim(),
    baseUrl:        document.getElementById('s-baseurl').value.trim(),
    model:          document.getElementById('s-model').value.trim(),
    timeoutSeconds: parseInt(document.getElementById('s-timeout').value)||120,
    envVars:        readEnvVarsFromUi(),
  };
}

function resolveRuntimeEnvFromEnvVars(envVars) {
  const rows = Array.isArray(envVars) ? envVars : [];
  for (const row of rows) {
    const key = String(row?.key || '').trim().toLowerCase();
    if (key !== 'env') continue;
    const v = String(row?.globalValue || '').trim().toLowerCase();
    if (v === 'production' || v === 'staging' || v === 'draft') return v;
  }
  return 'production';
}

function applyRuntimeEnvFromSettings(envVars) {
  // Retained for settings compatibility; runtime execution is owned by widgets/apps.
  window.RUNTIME_ENV = resolveRuntimeEnvFromEnvVars(envVars);
}

function showTestResult(ok, msg) {
  const el = document.getElementById('test-result');
  el.className = 'test-result ' + (ok?'ok':'fail');
  el.textContent = (ok?'✓ ':'✗ ') + msg;
  el.style.display = 'block';
}

function updateStatusDot(ok) {
  document.getElementById('status-dot').className = 'status-dot '+(ok?'ok':'fail');
  document.getElementById('status-text').textContent = ok ? t('settings.configured') : t('settings.notConfigured');
}

function updateSettingsBtn(configured) {
  document.getElementById('fb-settings').classList.toggle('unconfigured', !configured);
}

// ─── Init ─────────────────────────────────────────────────────────────────────
// Cache of widget manifests keyed by widget type, loaded once at startup
let _widgetManifests = {};

(async () => {
  applyI18n();
  try {
    const cfg = await fetch('/api/settings').then(r=>r.json());
    applyRuntimeEnvFromSettings(cfg.envVars || []);
    updateSettingsBtn(cfg.configured);
    if (!cfg.configured) setTimeout(openSettings, 800);
  } catch(e) {}

  // Load widget manifests once so upload / other capabilities are available
  try {
    const wData = await fetch('/api/widgets').then(r => r.json());
    (wData.widgets || []).forEach(w => {
      if (w.type) _widgetManifests[w.type] = w;
    });
    preloadCanvasWidgetsSoon();
    preloadAppsPanelSoon();
  } catch(e) {}

  await loadSessions();
  await loadPendingEvents();
  setInterval(loadPendingEvents, 10000);
  // Widget modules perform their own mount-time initialization.

  // Load and restore history for the current session (main) on startup.
  // switchSession short-circuits when target === current, so we do it here.
  const initSess = sessionData[currentSessionId];
  if (initSess && !initSess.messages.length) {
    try {
      const resp = await fetch(`/api/sessions/${currentSessionId}/messages`);
      if (resp.ok) {
        const { messages } = await resp.json();
        initSess.messages = (messages || []).map(m => {
          if (m.role === 'widget') return { role: 'assistant', widgetJson: m.widgetJson, processed: m.processed === true };
          return { role: m.role, html: md(m.content) };
        });
        // If we loaded real history, don't show the welcome hint
        if (initSess.messages.length > 0) initSess.showWelcome = false;
      }
    } catch(e) {}
  }
  restoreMessages(initSess || { messages: [], id: currentSessionId, showWelcome: true });
  updateCanvasSessionLabel();
  setReadOnlyMode(false); // main session is always active
})();
</script>
</body>
