// ─── Mode switching ───────────────────────────────────────────────────────────
let activeWidgetType = null;  // tracks current canvas widget type

// ── AIPP Widget View 协议 ────────────────────────────────────────────────────
// 每个 widget 当前激活的视图 id：{ [widgetType]: viewId }
const _aippActiveViews = {};

/**
 * Widget 前端在用户切换视图时调用此函数上报当前视图。
 * Host 发消息时自动将 (widgetType, viewId) 发送给后端，
 * 后端从 AppRegistry 查 widget manifest 的 llm_hint 注入 LLM。
 *
 * @param {string} widgetType
 * @param {string} viewId      如 'RELATION'
 */
function aippReportView(widgetType, viewId) {
  if (!widgetType || !viewId) return;
  _aippActiveViews[widgetType] = viewId;
}

/**
 * 返回当前 canvas 模式下 widget 的活跃视图（用于 sendMessage 上报后端）。
 * 若不在 canvas 模式或没有活跃 widget，返回 null。
 */
function aippCurrentWidgetView() {
  if (!isCanvasMode || !activeWidgetType) return null;
  const viewId = _aippActiveViews[activeWidgetType];
  if (!viewId) return null;
  return { widget_type: activeWidgetType, view_id: viewId };
}

function appIdForWidget(widgetType) {
  return (_widgetManifests[widgetType] && _widgetManifests[widgetType].app_id) || _currentAppId || '';
}

function appProxyUrlForWidget(widgetType, path) {
  const appId = appIdForWidget(widgetType);
  if (!appId) return path;
  const suffix = String(path || '').startsWith('/') ? path : '/' + path;
  return `/api/proxy/app/${encodeURIComponent(appId)}${suffix}`;
}

function updateCanvasSessionLabel() {
  const el = document.getElementById('canvas-session-label');
  const sess = sessionData[currentSessionId];
  const name = sess ? sess.name || currentSessionId : currentSessionId;
  const type = sess?.type || '';
  const showCanvasSession = !!canvasSessionId && !!(sess?.widgetType || activeWidgetType);
  const displayName = showCanvasSession ? `${name} · ${canvasSessionId}` : name;
  const maxLen = 16;
  const truncated = displayName.length > maxLen ? displayName.slice(0, maxLen) + '...' : displayName;
  el.textContent = type ? `${truncated}(${type})` : truncated;
  el.title = type ? `${displayName}(${type})` : displayName;
}

function enterCanvasMode(worldName, widgetType, initialData) {
  console.log('[enterCanvasMode]', worldName, widgetType);
  panelOpenBeforeCanvas = panelOpen;
  setPanelOpen(false);
  isCanvasMode = true;
  // Canvas widgets must remain interactive even when the source chat session
  // is archived/voided; readonly is only for plain chat/task history views.
  setReadOnlyMode(false);
  activeWidgetType = widgetType || activeWidgetType;
  document.body.classList.add('canvas-mode');

  // Plan D: 若 widget manifest 声明了 render.url，走通用 ESM 挂载，
  // 跳过所有 host-内 legacy 面板分支。
  const _planDManifest = _widgetManifests[activeWidgetType];
  const _planDUrl = _planDManifest && _planDManifest.render && _planDManifest.render.url;
  if (_planDUrl) {
    document.body.classList.remove('memory-mode');
    document.body.classList.add('aipp-canvas-mode');
    const mountEl = _ensureAippCanvasMount();
    mountAippWidget(mountEl, activeWidgetType, Object.assign({ worldName, canvasSessionId }, initialData || {}));
  } else {
    document.body.classList.remove('aipp-canvas-mode');
    document.body.classList.remove('memory-mode');
  }
  document.getElementById('mode-badge').textContent = t('mode.canvas');
  if (worldName) {
    const title = canvasSessionId ? `${worldName} · ${canvasSessionId}` : worldName;
    document.getElementById('side-title').textContent = title;
  }
  updateCanvasSessionLabel();
  syncFullToPanel();
  // Apply upload config for the active widget
  applyWidgetUploadConfig(_widgetManifests[activeWidgetType] || null);
}

function exitCanvasMode() {
  isCanvasMode = false;
  activeWidgetType = null;
  document.body.classList.remove('canvas-mode');
  document.body.classList.remove('memory-mode');
  document.body.classList.remove('aipp-canvas-mode');
  _unmountAippCanvasMount();
  document.getElementById('mode-badge').textContent = t('mode.chat');
  updateCanvasSessionLabel();
  if (sessionData[currentSessionId]) sessionData[currentSessionId].canvasMode = false;
  // Widget internals (selection/detail panels, etc.) are cleared by widget unmount.
  try { window.hideNodeDetail?.(); } catch {}
  setPanelOpen(panelOpenBeforeCanvas);
  updateFuncbarActive();
  applyWidgetUploadConfig(null);
}

/** 退出 canvas 按钮：退出 canvas 模式并返回 World One 主 session。 */
function exitToMainSession() {
  if (isCanvasMode) exitCanvasMode();
  if (currentSessionId !== 'main') {
    switchSession('main');
  }
}



function lcFirst(s) { return s ? s.charAt(0).toLowerCase() + s.slice(1) : s; }

// ─── Widget Upload (driven by manifest's upload config) ───────────────────────
let _widgetUploadConfig = null; // populated when a widget with upload capability is active

/**
 * Called when the active widget manifest is loaded / switched.
 * Shows or hides the upload button based on manifest.upload presence.
 */
function applyWidgetUploadConfig(manifest) {
  _widgetUploadConfig = (manifest && manifest.upload) ? manifest.upload : null;
  const btn = document.getElementById('btn-upload');
  const fileInput = document.getElementById('upload-file-input');
  if (!btn || !fileInput) return;

  if (_widgetUploadConfig) {
    btn.style.display = '';
    btn.title = _widgetUploadConfig.button_label || '上传文件';
    // Set accept filter from manifest
    const exts = (_widgetUploadConfig.accept || []).join(',');
    fileInput.accept = exts;
  } else {
    btn.style.display = 'none';
    fileInput.accept = '';
  }
}

function triggerWidgetUpload() {
  const fileInput = document.getElementById('upload-file-input');
  if (fileInput) { fileInput.value = ''; fileInput.click(); }
}

function handleUploadFileSelected(event) {
  const file = event.target.files && event.target.files[0];
  if (!file || !_widgetUploadConfig) return;

  const maxKb = _widgetUploadConfig.max_size_kb || 256;
  if (file.size > maxKb * 1024) {
    alert(`文件过大（最大 ${maxKb} KB），请压缩后重试。`);
    return;
  }

  const reader = new FileReader();
  reader.onload = e => {
    const content = e.target.result;
    const ext = file.name.includes('.') ? file.name.split('.').pop() : 'txt';
    const sizeKb = Math.round(file.size / 1024) || 0;
    const prompt = _widgetUploadConfig.prompt || '';

    // Assemble message per AippWidgetUpload.assembleMessage spec
    const sizeStr = sizeKb > 0 ? ` （${sizeKb} KB）` : '';
    const message = `用户上传了文件「${file.name}」${sizeStr}：\n\n\`\`\`${ext}\n${content}\n\`\`\`\n\n${prompt}`;

    // Inject into chat input and send
    const input = document.getElementById('full-input');
    if (input) {
      input.value = message;
      input.dispatchEvent(new Event('input'));
      sendMessage('full');
    }
  };
  reader.onerror = () => alert('文件读取失败，请重试。');
  reader.readAsText(file, 'utf-8');
}


function escHtml(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function syncFullToPanel() {
  const sess = sessionData[currentSessionId];
  const dst  = document.getElementById('panel-messages');
  dst.innerHTML = '';
  if (!sess || !sess.messages || !sess.messages.length) return;
  sess.messages.forEach(m => dst.appendChild(buildMsgEl(m.role, null, m.html)));
  dst.scrollTop = dst.scrollHeight;
}

// ─── Session switching ────────────────────────────────────────────────────────
async function switchSession(targetId) {
  if (currentSessionId === targetId) return;

  // 保存当前 session 的 DOM 状态
  const cur = sessionData[currentSessionId];
  if (cur) {
    cur.canvasMode = isCanvasMode;
    const activeMsgEl = isCanvasMode
      ? document.getElementById('panel-messages')
      : document.getElementById('full-messages');
    cur.messages = saveDomMessages(activeMsgEl);
  }

  currentSessionId = targetId;
  const next = sessionData[targetId];
  if (!next) return;

  // 1. 若本地无消息记录，从服务端加载对话历史
  if (!next.messages || next.messages.length === 0) {
    try {
      const resp = await fetch(`/api/sessions/${targetId}/messages`);
      if (resp.ok) {
        const { messages } = await resp.json();
        next.messages = (messages || []).map(m => {
          if (m.role === 'widget') {
            // widget 消息：保存 widgetJson，restoreMessages 会重建 ESM widget
            return { role: 'assistant', widgetJson: m.widgetJson, processed: m.processed === true };
          }
          return { role: m.role, html: md(m.content) };
        });
      }
    } catch(e) { /* 静默失败，显示空页面 */ }
  }

  // 2. 判断 canvas 模式切换
  const needsCanvas = next.canvasMode || !!next.widgetType;
  if (needsCanvas && !isCanvasMode) {
    enterCanvasMode(next.name, next.widgetType, { canvasSessionId: next.canvasSessionId || canvasSessionId });
  } else if (needsCanvas && isCanvasMode && next.widgetType !== activeWidgetType) {
    // switching between different canvas widget types
    activeWidgetType = next.widgetType || activeWidgetType;
    const _swManifest = _widgetManifests[activeWidgetType];
    const _swPlanDUrl = _swManifest && _swManifest.render && _swManifest.render.url;
    if (_swPlanDUrl) {
      document.body.classList.remove('memory-mode');
      document.body.classList.add('aipp-canvas-mode');
      mountAippWidget(_ensureAippCanvasMount(), activeWidgetType, { worldName: next.name, canvasSessionId: next.canvasSessionId || canvasSessionId });
    } else {
      document.body.classList.remove('memory-mode');
      document.body.classList.remove('aipp-canvas-mode');
      _unmountAippCanvasMount();
    }
    if (next.name) {
      const title = (next.canvasSessionId || canvasSessionId)
        ? `${next.name} · ${next.canvasSessionId || canvasSessionId}`
        : next.name;
      document.getElementById('side-title').textContent = title;
    }
  } else if (!needsCanvas && isCanvasMode) {
    exitCanvasMode();
  }
  updateCanvasSessionLabel();

  // 3. 先渲染消息
  restoreMessages(next);
  // canvas 模式切换后（如 memory→world），panel-messages 也需同步更新
  if (isCanvasMode) syncFullToPanel();
  renderSessions();

  // 4. Canvas widgets own their restore/data-refresh behavior. Host only keeps
  // the canvas session id and remounts the AIPP-provided module.
  if (needsCanvas) {
    if (next.canvasSessionId) canvasSessionId = next.canvasSessionId;
  }

  // App canvas sessions should stay interactive even if their backing session is archived.
  // Read-only lock remains for normal conversation/task/event sessions.
  const shouldReadOnly = !needsCanvas && next.type !== 'app' && isArchived(next);
  setReadOnlyMode(shouldReadOnly);
}

/** 将纯文本内容转为安全 HTML 显示（保留换行）。 */
function escapeHtmlContent(text) {
  if (!text) return '';
  return text
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/\n/g, '<br>');
}

function saveDomMessages(container) {
  const result = [];
  container.querySelectorAll('.msg').forEach(el => {
    // widget 消息：从 data 属性恢复 widgetJson 和 processed 状态
    if (el.dataset.widgetJson) {
      result.push({
        role: 'assistant',
        widgetJson: el.dataset.widgetJson,
        processed: el.dataset.processed === 'true',
      });
      return;
    }
    const role   = el.classList.contains('user') ? 'user'
                 : el.classList.contains('system') ? 'system' : 'assistant';
    const bubble = el.querySelector('.msg-bubble');
    result.push({ role, html: bubble ? bubble.innerHTML : '' });
  });
  return result;
}

function restoreMessages(sess) {
  const fullBox  = document.getElementById('full-messages');
  const panelBox = document.getElementById('panel-messages');
  fullBox.innerHTML  = '';
  panelBox.innerHTML = '';

  if (sess.showWelcome || (!sess.messages.length && sess.id === 'main')) {
    buildWelcomeHint();
    return;
  }

  const messages = _normalizedConversationMessages(sess.messages || []);
  messages.forEach(m => {
    let el;
    if (m.widgetJson) {
      // 刷新恢复：无论 processed 与否都保留 widget。
      // processed=true 时用只读模式回显已输入值，按钮禁用。
      const forceReadonly = m.processed || _isReadonlyWidgetJson(m.widgetJson);
      const widgetJson = forceReadonly ? _toReadonlyWidgetJson(m.widgetJson) : m.widgetJson;
      el = document.createElement('div');
      el.className = 'msg assistant html-widget-msg';
      renderHtmlWidget(widgetJson, el);
      if (forceReadonly) el.dataset.processed = 'true';
      // 注入 widget delete 按钮
      _injectWidgetActions(el);
    } else {
      el = buildMsgEl(m.role, null, m.html);
    }
    fullBox.appendChild(el);
    if (sess.canvasMode) panelBox.appendChild(el.cloneNode(true));
  });
  fullBox.scrollTop  = fullBox.scrollHeight;
  panelBox.scrollTop = panelBox.scrollHeight;
}

function _toReadonlyWidgetJson(widgetJson, options = {}) {
  try {
    const root = typeof widgetJson === 'string' ? JSON.parse(widgetJson) : (widgetJson || {});
    const data = root.data && typeof root.data === 'object' ? root.data : {};
    const event = data.event && typeof data.event === 'object' ? data.event : {};
    const business = event.business_data && typeof event.business_data === 'object' ? event.business_data : {};
    const resumeArgs = business.resume_args && typeof business.resume_args === 'object' ? business.resume_args : {};
    const providedParams = options.providedParameters && typeof options.providedParameters === 'object'
      ? options.providedParameters
      : null;
    const mergedBusiness = providedParams
      ? Object.assign({}, business, {
          provided_parameters: providedParams,
          resume_args: Object.assign({}, resumeArgs, { parameters: providedParams })
        })
      : business;
    const state = _normalizeWidgetState(options.widgetState);
    const readonlyEvent = Object.assign({}, event, { business_data: mergedBusiness });
    const readonlyData = Object.assign({}, data, {
      event: readonlyEvent,
      __readonly: true,
      __submitted: true,
      ...(state ? { __widget_state: state } : {})
    });
    return JSON.stringify(Object.assign({}, root, { data: readonlyData }));
  } catch (_) {
    return widgetJson;
  }
}

function _normalizeWidgetState(state) {
  if (!state || typeof state !== 'object' || Array.isArray(state)) return null;
  return Object.keys(state).length ? state : null;
}

function _extractWidgetState(widgetJson) {
  try {
    const root = typeof widgetJson === 'string' ? JSON.parse(widgetJson) : (widgetJson || {});
    return _normalizeWidgetState(root?.data?.__widget_state);
  } catch (_) {
    return null;
  }
}

function _isReadonlyWidgetJson(widgetJson) {
  try {
    const root = typeof widgetJson === 'string' ? JSON.parse(widgetJson) : (widgetJson || {});
    const data = root?.data && typeof root.data === 'object' ? root.data : {};
    return data.__readonly === true || data.__submitted === true;
  } catch (_) {
    return false;
  }
}

// ─── Streaming helpers ────────────────────────────────────────────────────────
function setStreaming(on) {
  isStreaming = on;
  ['full','panel'].forEach(area => {
    const send = document.getElementById(area + '-send');
    const stop = document.getElementById(area + '-stop');
    if (send) send.style.display = on ? 'none' : 'flex';
    if (stop) stop.style.display = on ? 'flex' : 'none';
  });
}

function stopStreaming() {
  if (abortController) { abortController.abort(); abortController = null; }
}

function activeMessages() {
  return document.getElementById(isCanvasMode ? 'panel-messages' : 'full-messages');
}

// ─── Send & receive ───────────────────────────────────────────────────────────
async function sendMessage(area) {
  if (isStreaming) return;
  const input = document.getElementById(area + '-input');
  const msg = input.value.trim();
  if (!msg) return;
  input.value = '';
  autoResize(input);
  hideWelcome();

  addMessage('user', msg);
  setStreaming(true);

  const triggerMsg = msg;
  abortController = new AbortController();
  let liveId          = addLiveProgress();
  let pendingThinking = null;   // 从 thinking 事件暂存，等第一个 text_token 时一起渲染
  let streamState     = null;   // { msgEl, textDiv, fullText } — 流式回答状态
  let liveFinalized   = false;

  try {
    // ── AIPP Widget View 协议：前端只上报 (widget_type, view_id)，
    //    后端 AppRegistry 从 widget manifest 查 llm_hint，完全泛化，不依赖 widget 特殊逻辑。
    const widgetView = aippCurrentWidgetView();

    const resp = await fetch('/api/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ session_id: currentSessionId, message: msg,
                             ...(widgetView ? { widget_view: widgetView } : {}) }),
      signal: abortController.signal,
    });

    const reader  = resp.body.getReader();
    const decoder = new TextDecoder();
    let buffer = '';

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      buffer += decoder.decode(value, { stream: true });
      const lines = buffer.split('\n');
      buffer = lines.pop();

      for (const line of lines) {
        if (!line.startsWith('data:')) continue;
        const json = line.slice(5).trim();
        if (!json) continue;
        try {
          const ev = JSON.parse(json);
          console.log('[SSE]', ev.type, ev.content?.slice?.(0, 80));

          if (ev.type === 'annotation') {
            // AIPP 灰色注解行（在工具 chip 前显示 AIPP 标识）
            updateLiveProgress(liveId, ev);

          } else if (ev.type === 'tool_call') {
            // 工具调用代表本轮文本只是中途叙述，不是最终答案：
            // 把当前流式气泡降级成灰色 thinking 样式，等下一段 text_token 重开新气泡。
            if (streamState) {
              streamState.msgEl.classList.add('thinking-roll', 'mid-tool-thinking');
              streamState.textDiv.classList.remove('streaming');
              streamState = null;
              // 同时新建一个 live-progress 气泡承载工具进度
              liveId = addLiveProgress();
              liveFinalized = false;
              pendingThinking = null;
            }
            updateLiveProgress(liveId, ev);

          } else if (ev.type === 'canvas') {
            handleCanvasCommand(JSON.parse(ev.content));

          } else if (ev.type === 'html_widget') {
            // is_canvas_mode=false widget：渲染为聊天流内嵌 ESM 卡片
            // 注意：若 text_token 先到，startStreamingResponse 已把 liveId 从 DOM 移除
            // 并用 streamState.msgEl 替代——此时需接管 msgEl 来渲染 widget
            let containerEl = document.getElementById(liveId);
            if (!containerEl && streamState) {
              // text_token 先于 html_widget 到达：接管流式文本元素
              containerEl = streamState.msgEl;
              streamState = null; // 不再走 finalizeStream
            }
            if (containerEl) {
              containerEl.innerHTML = '';
              containerEl.className = 'msg assistant'; // 清掉流式相关 class
              renderHtmlWidget(ev.content, containerEl);
              _lastHtmlWidgetEl = containerEl;
              _lastHtmlWidgetSessionId = currentSessionId;
              liveFinalized = true;
              const sess = sessionData[currentSessionId];
              if (sess) sess.messages.push({ role: 'assistant', widgetJson: ev.content });
            }

          } else if (ev.type === 'session') {
            // session 切换：移除当前进度，在新 session 里重建进度气泡
            removeLiveProgress(liveId);
            handleSessionEvent(JSON.parse(ev.content), triggerMsg);
            liveId = addLiveProgress();
            streamState = null;
            pendingThinking = null;
            liveFinalized = false;

          } else if (ev.type === 'thinking') {
            pendingThinking = ev.content;
            updateLiveProgress(liveId, ev);  // 显示思考预览

          } else if (ev.type === 'text_token') {
            // 第一个 token：进度气泡升级为流式回答气泡
            if (!streamState) {
              // 不再把中间 reasoning 文本带到最终答案气泡里
              const { msgEl, textDiv } = startStreamingResponse(liveId, null);
              streamState = { msgEl, textDiv, fullText: '' };
              liveFinalized = true;  // live bubble 已被替换，不需 removeLiveProgress
              pendingThinking = null;
            }
            streamState.fullText += ev.content;
            appendToken(streamState.textDiv, streamState.fullText);

          } else if (ev.type === 'text') {
            // 兼容非流式路径（工具调用失败后直接返回 text 的情况）
            const thinking = pendingThinking;
            pendingThinking = null;
            if (!streamState) {
              finalizeLiveProgress(liveId, ev.content, thinking);
              liveFinalized = true;
            }

          } else if (ev.type === 'error') {
            removeLiveProgress(liveId);
            handleError(ev.content);
            liveFinalized = true;

          } else if (ev.type === 'done') {
            // 最终答案到达：移除所有中途 thinking 灰色气泡
            document.querySelectorAll('.msg.assistant.mid-tool-thinking').forEach(el => el.remove());
            if (streamState) {
              finalizeStream(streamState.msgEl, streamState.textDiv,
                             streamState.fullText, null);
              streamState = null;
            } else if (!liveFinalized) {
              removeLiveProgress(liveId);
            }
          }
        } catch(e) {}
      }
    }
  } catch(e) {
    if (e.name !== 'AbortError') {
      if (streamState) finalizeStream(streamState.msgEl, streamState.textDiv,
                                      streamState.fullText, pendingThinking);
      else removeLiveProgress(liveId);
      addMessage('assistant', t('error.connect') + e.message);
    }
  }

  if (!liveFinalized && !streamState) removeLiveProgress(liveId);
  setStreaming(false);
  abortController = null;
}

function quickSend(text) {
  document.getElementById('full-input').value = text;
  sendMessage('full');
}

// 跟踪 IME 合成状态，防止拼音输入回车被误判为发送
let _imeComposing = false;
document.addEventListener('compositionstart', () => { _imeComposing = true; });
document.addEventListener('compositionend',   () => { _imeComposing = false; });

function handleKey(e, area) {
  if (e.key === 'Enter' && !e.shiftKey && !_imeComposing) {
    e.preventDefault();
    sendMessage(area);
  }
  setTimeout(() => autoResize(e.target), 0);
}

// ─── SESSION event ────────────────────────────────────────────────────────────
function handleSessionEvent(data, triggerMsg) {
  const { ui_session_id, name, type, welcome_message } = data;
  if (!ui_session_id || ui_session_id === 'main') {
    console.warn('[handleSessionEvent] refusing to overwrite main session, got:', ui_session_id);
    return;
  }
  const welcomeHtml = md(welcome_message || `进入 **${name}**`);

  if (sessionData[ui_session_id]) {
    // Session already exists: update metadata but preserve chat history
    const existing = sessionData[ui_session_id];
    existing.name   = name || existing.name;
    if (type) existing.type = type;
    existing.status = existing.status === 'active' ? 'active' : existing.status;
    // Only switch to it (don't re-render as blank)
    switchSession(ui_session_id);
    if (type !== 'app') {
      setPanelOpen(true);
      if (type === 'task' || type === 'event') {
        activeCategory = type;
        updatePanelTitle();
      }
    }
  } else {
    // New session: create fresh
    sessionData[ui_session_id] = {
      id: ui_session_id, type, name, status: 'active',
      messages: [{ role: 'system', html: welcomeHtml }],
      canvasMode: false,
      showWelcome: false,
    };
    switchSession(ui_session_id);
    // app sessions never appear in Task Panel
    if (type !== 'app') {
      // 新建任务时，确保面板是展开的，让用户看到新 task 条目
      setPanelOpen(true);
      // 切换到任务分类，让新 task 高亮
      if (type === 'task' || type === 'event') {
        activeCategory = type;
        updatePanelTitle();
      }
    }
  }
  updateFuncbarActive();
  renderSessions();
}

// ─── Canvas command ───────────────────────────────────────────────────────────
let canvasSessionId = null;  // active canvas app session id

function handleCanvasCommand(cmd) {
  console.log('[CANVAS CMD]', JSON.stringify(cmd));
  if (!cmd?.action) return;
  const { action, widget_type, props } = cmd;

  // sys.* — AIPP 系统内置 widget
  // LLM 触发（来自 canvas 事件）→ inline card 嵌入当前 chat 面板，不影响 canvas 模式
  // 直接 JS 调用（AIPP widget 内部）→ modal overlay（见 showSysModal）
  if (widget_type && widget_type.startsWith('sys.')) {
    if (action === 'open') addSysInlineCard(widget_type, cmd.data || props || {});
    return;
  }

  const targetWidgetType = widget_type || activeWidgetType;
  if (!targetWidgetType) return;
  const targetManifest = _widgetManifests[targetWidgetType] || {};
  const targetIsPlanD = !!(targetManifest.render && targetManifest.render.url);

  if (cmd.session_id && cmd.session_id !== canvasSessionId) {
    canvasSessionId = cmd.session_id;
  }

  if (targetIsPlanD) {
    const widgetData = Object.assign({}, props || {}, cmd.data || {}, {
      canvasSessionId: cmd.session_id || canvasSessionId || undefined,
      sessionName: cmd.session_name || props?.session_name,
      canvasCommand: cmd,
    });
    if (sessionData[currentSessionId]) {
      sessionData[currentSessionId].canvasMode = action !== 'close';
      sessionData[currentSessionId].widgetType = targetWidgetType;
      if (cmd.session_id) sessionData[currentSessionId].canvasSessionId = cmd.session_id;
    }
    if (action === 'close') exitToMainSession();
    else if (!isCanvasMode || activeWidgetType !== targetWidgetType) {
      enterCanvasMode(cmd.session_name || props?.session_name || targetWidgetType, targetWidgetType, widgetData);
    } else if (typeof window.aippHandleCanvasCommand === 'function') {
      window.aippHandleCanvasCommand(cmd);
    } else {
      // Same-widget canvas refresh: most app widgets only implement mount().
      // Remount with fresh data instead of leaving the canvas stale/blank.
      mountAippWidget(_ensureAippCanvasMount(), targetWidgetType, widgetData);
    }
    return;
  }
}

async function memProxyTool(tool, args) {
  const ctx = { userId: 'default', sessionId: currentSessionId, agentId: 'worldone' };
  const r = await fetch(`/api/proxy/tools/${tool}`, {
    method: 'POST', headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ args, _context: ctx }),
  });
  return r.json();
}

/** handleSseEvent: minimal handler for events coming from openAppDirect(). */
function handleSseEvent(ev, containerEl) {
  console.log('[SSE]', ev.type, ev.content?.slice?.(0, 120));
  if (ev.type === 'canvas')       { handleCanvasCommand(JSON.parse(ev.content)); }
  else if (ev.type === 'html_widget') {
    renderHtmlWidget(ev.content, containerEl);
    const sess = sessionData[currentSessionId];
    if (sess && sess.messages && containerEl) {
      // openAppDirect created a placeholder assistant message before the SSE result.
      // Replace that placeholder in local state so refresh/session switching restores
      // the widget instead of an empty assistant bubble.
      const widgetMsg = { role: 'assistant', widgetJson: ev.content, processed: containerEl.dataset.processed === 'true' };
      if (sess.messages.length > 0) sess.messages[sess.messages.length - 1] = widgetMsg;
      else sess.messages.push(widgetMsg);
    }
  }
  else if (ev.type === 'session') { handleSessionEvent(JSON.parse(ev.content), ''); }
  else if (ev.type === 'error')   { containerEl.innerHTML = '<span style="color:var(--danger)">' + ev.content + '</span>'; }
}

function addMessage(role, text, thinking = null) {
  const box = activeMessages();
  const el  = buildMsgEl(role, text, null, thinking);
  if (role === 'user' && text) el.dataset.rawText = text;  // 保存原始文本供重问/编辑使用
  box.appendChild(el);
  box.scrollTop = box.scrollHeight;
  if (isCanvasMode) {
    const full = document.getElementById('full-messages');
    full.appendChild(el.cloneNode(true));
  }
  const sess = sessionData[currentSessionId];
  if (sess) sess.messages.push({ role, html: el.querySelector('.msg-bubble').innerHTML });
  return el;
}

function buildThinkingBlock(thinking) {
  if (!thinking) return '';
  const chevron = `<svg class="th-chevron" viewBox="0 0 10 10" width="9" height="9" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><path d="M3 2l4 3-4 3"/></svg>`;
  return `<div class="thinking-block"><button class="thinking-toggle" type="button" onclick="toggleThinking(this)">${chevron}思考过程</button><div class="thinking-body">${md(thinking)}</div></div>`;
}

function toggleThinking(btn) {
  btn.classList.toggle('open');
  btn.nextElementSibling.classList.toggle('visible');
}

function buildMsgEl(role, text, preHtml, thinking = null) {
  const div = document.createElement('div');
  div.className = 'msg ' + role;
  const av = role === 'user' ? 'U' : role === 'system' ? '✓' : 'W';
  let inner;
  if (thinking && role === 'assistant') {
    inner = buildThinkingBlock(thinking) + (preHtml || md(text || ''));
  } else {
    inner = preHtml || md(text || '');
  }

  // SVG icons
  const icoTrash  = `<svg viewBox="0 0 14 14" width="13" height="13" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"><path d="M2 3.5h10M5.5 3.5V2.5a.5.5 0 01.5-.5h2a.5.5 0 01.5.5v1M5.5 6v4.5M8.5 6v4.5M3 3.5l.7 7.2a.5.5 0 00.5.3h5.6a.5.5 0 00.5-.3L11 3.5"/></svg>`;
  const icoRetry  = `<svg viewBox="0 0 14 14" width="13" height="13" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"><path d="M2 7a5 5 0 105.5-4.97"/><path d="M5.5 1v3h3"/></svg>`;
  const icoPencil = `<svg viewBox="0 0 14 14" width="13" height="13" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"><path d="M9.5 2.5l2 2L4 12H2v-2L9.5 2.5z"/></svg>`;
  const icoCopy   = `<svg viewBox="0 0 14 14" width="13" height="13" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"><rect x="5" y="5" width="7" height="8" rx="1"/><path d="M9 5V3a1 1 0 00-1-1H3a1 1 0 00-1 1v7a1 1 0 001 1h2"/></svg>`;

  let actions = '';
  if (role === 'user') {
    actions = `<div class="msg-actions">
      <button class="msg-action-btn" title="重问" onclick="msgReask(this)">${icoRetry}</button>
      <button class="msg-action-btn" title="编辑" onclick="msgEdit(this)">${icoPencil}</button>
      <button class="msg-action-btn" title="删除" onclick="msgDelete(this)">${icoTrash}</button>
    </div>`;
  } else if (role === 'assistant') {
    actions = `<div class="msg-actions">
      <button class="msg-action-btn" title="复制" onclick="msgCopy(this)">${icoCopy}</button>
      <button class="msg-action-btn" title="删除" onclick="msgDelete(this)">${icoTrash}</button>
    </div>`;
  }

  div.innerHTML = `<div class="msg-avatar">${av}</div><div class="msg-body"><div class="msg-bubble">${inner}</div>${actions}</div>`;
  return div;
}

// ── 工具名 → 简短中文标签（Host 解耦：动态 fetch /api/tool-labels）─────────
let TOOL_LABELS = {};
(async function _loadToolLabels() {
  try {
    const r = await fetch('/api/tool-labels');
    if (r.ok) TOOL_LABELS = await r.json();
  } catch (e) { /* 静默：未注册任何 display_label_zh 时为空字典，回退到工具名 */ }
})();
function toolLabel(name) { return TOOL_LABELS[name] || name; }

// ── Message action helpers ────────────────────────────────────────────────

/** 从 action 按钮找到所属 .msg 元素 */
function _msgEl(btn) { return btn.closest('.msg'); }

/**
 * 从 sessionData.messages 中移除与 DOM 元素对应的条目，并返回其索引（-1 表示未找到）。
 * 通过元素在消息容器中的位置（索引）定位。
 */
function _removeFromSession(el) {
  const box = el.parentNode;
  if (!box) return -1;
  const idx = Array.from(box.children).indexOf(el);
  if (idx < 0) return -1;
  const sess = sessionData[currentSessionId];
  if (sess && sess.messages) sess.messages.splice(idx, 1);
  return idx;
}

/** 删除消息（用户消息同时删除紧随其后的 assistant 消息）。 */
function msgDelete(btn) {
  if (isStreaming) return;
  const el   = _msgEl(btn);
  const box  = el.parentNode;
  if (!box) return;

  // 计算起始索引（删 DB 前先算，因为 _removeFromSession 会改变数组）
  const idx = Array.from(box.children).indexOf(el);
  let count = 1;

  if (el.classList.contains('user')) {
    const next = el.nextElementSibling;
    if (next && next.classList.contains('assistant')) {
      count = 2;
      _removeFromSession(next); // 先删后一条（索引先不变）
      next.remove();
    }
  }
  _removeFromSession(el);
  el.remove();

  // 同步删除后端 DB
  if (idx >= 0) {
    fetch(`/api/sessions/${currentSessionId}/messages/range?from=${idx}&count=${count}`,
      { method: 'DELETE' }).catch(() => {});
  }
}

/** 重问：用原问题重新发送，先删除该问题及其 assistant 回答。 */
async function msgReask(btn) {
  if (isStreaming) return;
  const el  = _msgEl(btn);
  const raw = el.dataset.rawText || el.querySelector('.msg-bubble')?.innerText?.trim();
  if (!raw) return;
  await msgReaskWithText(el, raw);
}

/** 编辑：将 user 气泡替换为可编辑文本框，Enter 键重问。 */
function msgEdit(btn) {
  if (isStreaming) return;
  const el     = _msgEl(btn);
  const bubble = el.querySelector('.msg-bubble');
  const raw    = el.dataset.rawText || bubble?.innerText?.trim() || '';

  const ta = document.createElement('textarea');
  ta.className = 'msg-edit-area';
  ta.value     = raw;
  ta.rows      = Math.min(6, (raw.match(/\n/g) || []).length + 1 || 1);

  // 用 textarea 替换 bubble
  bubble.replaceWith(ta);
  ta.focus();
  ta.setSelectionRange(ta.value.length, ta.value.length);

  // Enter 确认，Escape 取消
  ta.addEventListener('keydown', function(e) {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      const newText = ta.value.trim();
      if (!newText) return;
      ta.replaceWith(bubble);  // 恢复 bubble（下面会移除 el）
      msgReaskWithText(el, newText);
    } else if (e.key === 'Escape') {
      ta.replaceWith(bubble);
    }
  });
}

/** 以指定文本重问，并用新结果覆盖旧 assistant 回答。 */
async function msgReaskWithText(userEl, newText) {
  const next = userEl.nextElementSibling;
  if (next && next.classList.contains('assistant')) {
    _removeFromSession(next);
    next.remove();
  }
  _removeFromSession(userEl);
  userEl.remove();

  // 必须 await：确保后端清除最后一个 user-turn（含工具调用多条记录）后，再发新消息
  // 否则新消息到达时旧 user 消息仍在 LLM history，导致 LLM 用文字代替工具响应
  const sid = currentSessionId;
  try { await fetch(`/api/sessions/${sid}/messages/last`, { method: 'DELETE' }); }
  catch (e) { /* 静默失败 */ }

  const area  = isCanvasMode ? 'panel' : 'full';
  const input = document.getElementById(area + '-input');
  if (input) { input.value = newText; sendMessage(area); }
}

/** 复制 assistant 消息文本到剪贴板。 */
function msgCopy(btn) {
  const bubble = _msgEl(btn)?.querySelector('.msg-bubble');
  if (!bubble) return;
  const text = bubble.innerText || bubble.textContent || '';
  navigator.clipboard.writeText(text).then(() => {
    // 短暂提示已复制
    btn.style.color = 'var(--success, #4fbf8f)';
    setTimeout(() => { btn.style.color = ''; }, 1200);
  });
}

// ── Live progress helpers ─────────────────────────────────────────────────

/** 在当前活跃消息区创建实时进度气泡，返回其 DOM id。 */
function addLiveProgress() {
  const id  = 'lp-' + Date.now();
  const box = activeMessages();
  const div = document.createElement('div');
  div.id        = id;
  div.className = 'msg assistant live-progress';
  const chipIcon = `<svg viewBox="0 0 12 12" width="9" height="9" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><circle cx="6" cy="6" r="4"/><path d="M6 4v2l1.5 1"/></svg>`;
  div.innerHTML = `<div class="msg-avatar">W</div><div class="msg-bubble live-bubble">` +
    `<div class="lp-status"><span class="lp-spinner"></span><span>处理中…</span></div>` +
    `<div class="lp-tools"></div>` +
    `<div class="lp-thinking-preview"></div>` +
    `</div>`;
  box.appendChild(div);
  box.scrollTop = box.scrollHeight;
  // canvas 模式：同步镜像到 full-messages（保存历史用，不需要显示）
  if (isCanvasMode) {
    const full = document.getElementById('full-messages');
    const clone = div.cloneNode(true);
    clone.id = id + '-full';
    full.appendChild(clone);
  }
  return id;
}

/** 用工具调用 chip、annotation 或思考内容更新进度气泡。 */
function updateLiveProgress(id, ev) {
  const el = document.getElementById(id);
  if (!el) return;
  const box = activeMessages();
  if (ev.type === 'annotation') {
    // AIPP 灰色注解行：在工具列表之前插入一行小标签
    let info = {};
    try { info = JSON.parse(ev.content); } catch(e) {}
    const label = info.label || ev.content;
    const tools = el.querySelector('.lp-tools');
    // 已有同 label 的 annotation 就不重复插
    if (!tools.querySelector(`[data-aipp="${label}"]`)) {
      const badge = document.createElement('span');
      badge.className = 'lp-aipp-badge';
      badge.dataset.aipp = label;
      badge.innerHTML = `<svg viewBox="0 0 10 10" width="8" height="8" fill="none" stroke="currentColor" stroke-width="1.3"><circle cx="5" cy="5" r="4"/><path d="M5 3v2.5M5 7h.01"/></svg> ${label}`;
      tools.insertBefore(badge, tools.firstChild);
    }
    const status = el.querySelector('.lp-status');
    if (status) status.style.display = 'none';
  } else if (ev.type === 'tool_call') {
    const tools = el.querySelector('.lp-tools');
    const chip  = document.createElement('span');
    chip.className = 'lp-tool-chip';
    const gearSvg = `<svg viewBox="0 0 12 12" width="9" height="9" fill="none" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"><circle cx="6" cy="6" r="2"/><path d="M6 1v1.5M6 9.5V11M1 6h1.5M9.5 6H11M2.6 2.6l1.1 1.1M8.3 8.3l1.1 1.1M2.6 9.4l1.1-1.1M8.3 3.7l1.1-1.1"/></svg>`;
    chip.innerHTML = gearSvg + toolLabel(ev.content);
    tools.appendChild(chip);
    // 有工具 chip 后隐藏"处理中…"状态行
    const status = el.querySelector('.lp-status');
    if (status) status.style.display = 'none';
  } else if (ev.type === 'thinking') {
    const tp = el.querySelector('.lp-thinking-preview');
    if (tp) { tp.innerHTML = md(ev.content); tp.classList.add('visible'); }
  }
  box.scrollTop = box.scrollHeight;
}

/** 将进度气泡替换为最终干净的回答消息，并持久化到 session。 */
function finalizeLiveProgress(id, text, thinking) {
  const el = document.getElementById(id);
  if (!el) { addMessage('assistant', text, thinking); return; }

  const box    = activeMessages();
  const newEl  = buildMsgEl('assistant', text, null, thinking);
  box.replaceChild(newEl, el);
  box.scrollTop = box.scrollHeight;

  // 同步 full-messages 中的镜像
  if (isCanvasMode) {
    const full    = document.getElementById('full-messages');
    const fullLp  = document.getElementById(id + '-full');
    if (fullLp) full.replaceChild(newEl.cloneNode(true), fullLp);
  }

  // 持久化到 session（用 bubble innerHTML）
  const sess = sessionData[currentSessionId];
  if (sess) sess.messages.push({ role: 'assistant', html: newEl.querySelector('.msg-bubble').innerHTML });
}

/** 移除进度气泡（用于 error / done 时没有 text 到来的情况）。 */
function removeLiveProgress(id) {
  document.getElementById(id)?.remove();
  document.getElementById(id + '-full')?.remove();
}

// ── 流式文本渲染 ──────────────────────────────────────────────────────────────

/**
 * 将进度气泡升级为流式回答泡：
 * - 保留 thinking 块（若有）
 * - 添加空 .stream-text 容器，接收逐 token 追加
 * 返回 { msgEl, textDiv }
 */
function startStreamingResponse(liveId, thinking) {
  const box   = activeMessages();
  const livEl = document.getElementById(liveId);

  const msgEl = buildMsgEl('assistant', '', null, null);
  const bubble = msgEl.querySelector('.msg-bubble');

  // 思考块（若有）先放入
  if (thinking) bubble.innerHTML = buildThinkingBlock(thinking);

  // 流式文本占位 div
  const textDiv = document.createElement('div');
  textDiv.className = 'stream-text streaming';
  bubble.appendChild(textDiv);

  if (livEl) {
    if (livEl.parentNode === box) {
      box.replaceChild(msgEl, livEl);
    } else {
      // live bubble was added to a different container (e.g. full-messages before canvas activated)
      livEl.remove();
      box.appendChild(msgEl);
    }
  } else {
    box.appendChild(msgEl);
  }
  box.scrollTop = box.scrollHeight;

  // canvas 模式：更新 full-messages 中的镜像
  if (isCanvasMode) {
    const full   = document.getElementById('full-messages');
    const fullLp = document.getElementById(liveId + '-full');
    const clone  = msgEl.cloneNode(true);
    clone.id     = liveId + '-stream-full';
    if (fullLp) full.replaceChild(clone, fullLp); else full.appendChild(clone);
  }
  return { msgEl, textDiv };
}

/**
 * 追加一个 token 到流式文本区（高效，无 XSS 风险）。
 */
function appendToken(textDiv, fullText) {
  textDiv.innerHTML = md(fullText);
  const box = activeMessages();
  box.scrollTop = box.scrollHeight;
}

/**
 * 流式完成：将原始文本转为 markdown 最终渲染，移除光标动画，持久化。
 */
function finalizeStream(msgEl, textDiv, fullText, thinking) {
  // Keep the same DOM structure as streaming phase; only stop cursor animation
  // and ensure final markdown is fully rendered. This avoids "shrink/jump" on done.
  textDiv.classList.remove('streaming');
  textDiv.innerHTML = md(fullText);

  const bubble = msgEl.querySelector('.msg-bubble');

  // canvas 模式：同步 full-messages
  if (isCanvasMode) {
    const full      = document.getElementById('full-messages');
    const fullClone = document.getElementById(msgEl.id + '-stream-full');
    if (fullClone) full.replaceChild(msgEl.cloneNode(true), fullClone);
  }
  // 持久化到 session
  const sess = sessionData[currentSessionId];
  if (sess) sess.messages.push({ role: 'assistant', html: bubble.innerHTML });
}

function addTyping() { return addLiveProgress(); }
function removeTyping(id) { /* no-op: replaced by live/streaming progress */ }

function hideWelcome() {
  const hint = document.getElementById('welcome-hint');

    hint.innerHTML = '';

function buildWelcomeHint() {
  const el = document.getElementById('welcome-hint');

  el.innerHTML = `

    <p>${t('welcome.sub')}</p>

      <span class="chip" onclick="quickSend(${JSON.stringify(t('welcome.chip1.send'))})">${t('welcome.chip1')}</span>
      <span class="chip" onclick="quickSend(${JSON.stringify(t('welcome.chip2.send'))})">${t('welcome.chip2')}</span>
      <span class="chip" onclick="quickSend(${JSON.stringify(t('welcome.chip3.send'))})">${t('welcome.chip3')}</span>

}

function handleError(msg) {
  const isAuth = msg && (msg.includes('401') || msg.includes('Authentication') || msg.includes('api key'));
  if (isAuth) {
    addMessage('assistant', t('error.noApiKey') + ` <a href="#" onclick="openSettings();return false" style="color:var(--accent)"> → </a>`);
    updateSettingsBtn(false);
    setTimeout(openSettings, 500);
  } else {
    addMessage('assistant', '⚠️ ' + msg);
  }
}

// ─── Task actions ─────────────────────────────────────────────────────────────
async function completeSession(id, e) {
  e.stopPropagation();
  if (!await w1Confirm({
    title: t('confirm.complete'),
    message: t('confirm.complete.detail'),
  })) return;
  await fetch(`/api/sessions/${id}/complete`, { method: 'PATCH' });
  const sess = sessionData[id];
  if (sess) sess.status = 'completed';
  if (currentSessionId === id) {
    if (isCanvasMode) exitCanvasMode();
    switchSession('main');
    addMessageToSession('main', 'system', `**${t('task.completed')}** — ${sess?.name || ''}`);
  }
  renderSessions();
}

async function voidSession(id, e) {
  e.stopPropagation();
  await fetch(`/api/sessions/${id}/void`, { method: 'PATCH' });
  if (sessionData[id]) sessionData[id].status = 'voided';
  if (currentSessionId === id) {
    if (isCanvasMode) exitCanvasMode();
    switchSession('main');
  }
  renderSessions();
}

// ── Read-only mode (for viewing completed/voided sessions) ────────────────────
function setReadOnlyMode(readonly) {
  const inputs  = ['full-input', 'panel-input'];
  const sends   = ['full-send', 'panel-send'];
  const notices = ['full-readonly-notice', 'panel-readonly-notice'];

  inputs.forEach(id  => { const el = document.getElementById(id);  if (el) el.disabled = readonly; });
  sends.forEach(id   => { const el = document.getElementById(id);  if (el) el.disabled = readonly; });

  // Toggle global widget-readonly class (disables canvas, memory card actions, etc.)
  document.body.classList.toggle('session-readonly', readonly);

  // Propagate disabled state to each registered AIPP widget container
  document.querySelectorAll('[data-aipp-widget-type]').forEach(el => {
    el.dataset.aippDisabled = String(readonly);
  });

  // Build dynamic notice content
  let noticeHtml = '📖 只读模式 — 此会话已结束，无法继续发送消息';
  if (readonly) {
    const s = sessionData[currentSessionId];
    if (s && s.status === 'voided') {
      noticeHtml += ` <button class="readonly-delete-btn" onclick="hardDeleteSession('${currentSessionId}', event)">🗑 永久删除</button>`;
    }
  }
  notices.forEach(id => {
    const el = document.getElementById(id);
    if (!el) return;
    el.style.display = readonly ? '' : 'none';
    el.innerHTML = noticeHtml;
  });

  const fullFooter  = document.getElementById('full-footer');
  const panelFooter = document.getElementById('panel-footer-wrap');
  if (fullFooter)  fullFooter.style.opacity  = readonly ? '.5' : '';
  if (panelFooter) panelFooter.style.opacity = readonly ? '.5' : '';
}

async function archiveSession(id, e) {
  e.stopPropagation();
  const res = await fetch(`/api/sessions/${id}/archive`, { method: 'PATCH' });
  if ((await res.json()).ok) {
    if (sessionData[id]) sessionData[id].status = 'archived';
    if (currentSessionId === id) {
      if (isCanvasMode) exitCanvasMode();
      switchSession('main');
    }
    renderSessions();
  }
}

async function restoreSession(id, e) {
  e.stopPropagation();
  const res = await fetch(`/api/sessions/${id}/restore`, { method: 'PATCH' });
  if ((await res.json()).ok) {
    if (sessionData[id]) sessionData[id].status = 'active';
    renderSessions();
  }
}

async function hardDeleteSession(id, e) {
  e.stopPropagation();
  if (!await w1Confirm({
    title: t('confirm.delete'),
    message: t('confirm.delete.detail'),
    danger: true,
    confirmLabel: t('session.delete'),
  })) return;
  const res = await fetch(`/api/sessions/${id}`, { method: 'DELETE' });
  if ((await res.json()).ok) {
    delete sessionData[id];
    if (currentSessionId === id) switchSession('main');
    renderSessions();
  }
}

function addMessageToSession(targetId, role, text) {
  const sess = sessionData[targetId];
  if (!sess) return;
  sess.messages.push({ role, html: md(text) });
  if (targetId === currentSessionId) {
    const box = activeMessages();
    const el  = buildMsgEl(role, text);
    box.appendChild(el);
    box.scrollTop = box.scrollHeight;
  }
}

function addMessageToSessionHtml(targetId, role, html) {
  const sess = sessionData[targetId];
  if (!sess) return;
  sess.messages.push({ role, html: html || '' });
  if (targetId === currentSessionId) {
    const box = activeMessages();
    const el  = buildMsgEl(role, null, html || '');
    box.appendChild(el);
    box.scrollTop = box.scrollHeight;
  }
}

// ─── Session panel render ──────────────────────────────────────────────────────
let _completedPage   = 0;
let _completedSearch = '';
const COMPLETED_PAGE_SIZE = 10;

const SESSION_ICONS = { conversation: '💬', task: '📋', event: '⚡' };

// ── Pending world events (rendered as event-type entries in session list) ──
let pendingEvents = [];

async function loadPendingEvents() {
  try {
    const r = await fetch('/api/world-events?status=pending');
    if (!r.ok) { pendingEvents = []; renderSessions(); return; }
    const body = await r.json();
    pendingEvents = Array.isArray(body) ? body : (Array.isArray(body?.events) ? body.events : []);
  } catch (e) {
    pendingEvents = [];
  }
  renderSessions();
}
window.reloadPendingEvents = loadPendingEvents;

function eventDisplayName(ev) {
  const custom = (ev?.display_name || ev?.tags?.display_name || '').trim();
  if (custom) return custom;
  return (ev?.tags?.decision || ev?.source?.id || ev?.type || 'event').trim();
}

function buildPendingEventItem(ev) {
  const div = document.createElement('div');
  div.className = 'session-item';
  const icon = SESSION_ICONS['event'] || '⚡';
  const title = eventDisplayName(ev);
  const missing = ev?.business_data?.missing_parameters || [];
  const sub = missing.length
    ? (t('event.missingParams') + ': ' + missing.join(', '))
    : (ev?.type || '');
  div.innerHTML = `<span class="session-icon">${icon}</span>
    <span class="session-label session-label-event">
      <span class="event-primary">${esc(title)}</span>
      <span class="event-secondary">${esc(sub)}</span>
    </span>
    <span class="session-actions">
      <button type="button" class="sess-act" data-event-edit title="${esc(t('event.rename'))}">✎</button>
      <button type="button" class="sess-act bad" data-event-abort title="${esc(t('event.abort'))}">⊘</button>
    </span>`;
  div.querySelector('[data-event-edit]').onclick = (e) => beginRenameWorldEvent(ev, e);
  div.querySelector('[data-event-abort]').onclick = (e) => abortWorldEvent(ev, e);
  div.onclick = (e) => {
    if (e.target.closest('.session-actions, .sess-act')) return;
    if (e.target.closest('.session-label-editing')) return;
    handlePendingEventClick(ev);
  };
  return div;
}

function beginRenameWorldEvent(ev, e) {
  e?.stopPropagation();
  e?.preventDefault();
  if (!ev?.id) return;
  const row = e?.target?.closest?.('.session-item');
  const primary = row?.querySelector('.event-primary');
  if (!primary) return;
  _inlineEditLabel(primary, eventDisplayName(ev), async (newName) => {
    await saveWorldEventRename(ev.id, newName);
    if (ev.tags) ev.tags.display_name = newName;
    ev.display_name = newName;
    await loadPendingEvents();
  });
}

async function saveWorldEventRename(eventId, displayName) {
  const res = await fetch(`/api/world-events/${encodeURIComponent(eventId)}/rename`, {
    method: 'PATCH',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ display_name: displayName }),
  });
  if (!res.ok) {
    const body = await res.json().catch(() => ({}));
    throw new Error(body.error || 'rename failed');
  }
}

async function abortWorldEvent(ev, e) {
  e?.stopPropagation();
  if (!ev?.id) return;
  const name = eventDisplayName(ev);
  const ok = await w1Confirm({
    title: t('confirm.eventAbort.title'),
    message: t('confirm.eventAbort.message').replace('{name}', name),
    danger: true,
    confirmLabel: t('event.abort'),
  });
  if (!ok) return;
  try {
    const r = await fetch(`/api/world-events/${encodeURIComponent(ev.id)}/abort`, { method: 'PATCH' });
    const body = await r.json().catch(() => ({}));
    if (!r.ok) {
      appendAssistantMessage('⚠️ ' + (body.error || '放弃事件失败'));
      return;
    }
    await loadPendingEvents();
  } catch (err) {
    appendAssistantMessage('⚠️ 放弃事件失败：' + (err?.message || err));
  }
}

async function handlePendingEventClick(ev) {
  if (!ev) return;
  let targetSession = ev.ui_session_id || '';
  if (targetSession && !sessionData[targetSession]) {
    await loadSessions();
  }
  if (!targetSession || !sessionData[targetSession]) {
    console.warn('[handlePendingEventClick] unknown ui_session_id, falling back to main:', ev.ui_session_id);
    targetSession = 'main';
  }
  if (currentSessionId !== targetSession) {
    await switchSession(targetSession);
  }
  const sess = sessionData[currentSessionId];
  const widget = ev.widget || {};
  const payload = {
    widget_type: widget.type || 'sys.parameter-missing',
    title: (widget.schema && widget.schema.title) || t('event.widgetDefaultTitle'),
    data: { event: ev }
  };
  const json = JSON.stringify(payload);
  const targetEventId = ev.id || '';
  if (sess && Array.isArray(sess.messages)) {
    const last = sess.messages[sess.messages.length - 1];
    if (_widgetEventId(last?.widgetJson) === targetEventId && targetEventId) {
      const box = activeMessages();
      box.scrollTop = box.scrollHeight;
      return;
    }
    let existingIdx = -1;
    for (let i = sess.messages.length - 1; i >= 0; i--) {
      if (_widgetEventId(sess.messages[i]?.widgetJson) === targetEventId && targetEventId) {
        existingIdx = i;
        break;
      }
    }
    if (existingIdx >= 0) {
      const [msg] = sess.messages.splice(existingIdx, 1);
      sess.messages.push(msg);
      restoreMessages(sess);
      const box = activeMessages();
      box.scrollTop = box.scrollHeight;
      return;
    }
  }
  const elMsg = addMessage('assistant', '');
  elMsg.innerHTML = '';
  elMsg.className = 'msg assistant';
  renderHtmlWidget(json, elMsg);
  if (sess && sess.messages) {
    const widgetMsg = { role: 'assistant', widgetJson: json, processed: false };
    if (sess.messages.length > 0) sess.messages[sess.messages.length - 1] = widgetMsg;
    else sess.messages.push(widgetMsg);
  }
  fetch(`/api/sessions/${currentSessionId}/messages/client`, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ role: 'widget', widgetJson: json })
  }).catch(() => {});
}

function renderSessions() {
  const el = document.getElementById('session-list');
  el.innerHTML = '';

  const all    = Object.values(sessionData);
  const main   = sessionData['main'];
  // app sessions (type==='app') never appear in the task panel
  const others = all.filter(s => s.id !== 'main' && s.type !== 'app');

  let filtered = activeCategory === 'all' ? others : others.filter(s => s.type === activeCategory);

  const active    = filtered.filter(s => !isArchived(s));
  const voided    = filtered.filter(s => s.status === 'voided' || s.status === 'archived');
  const completed = filtered.filter(s => s.status === 'completed');

  // Active section
  if (activeCategory === 'all' || activeCategory === 'conversation') {
    el.appendChild(buildSessionItem(main));
    if (active.length > 0) el.appendChild(buildDivider());
  }
  active.forEach(s => el.appendChild(buildSessionItem(s)));

  // Pending world events appear as ⚡ event-type items (transient — not in
  // sessionData; clicking routes to the originating ui session and renders the widget).
  if (activeCategory === 'all' || activeCategory === 'event') {
    pendingEvents.forEach(ev => el.appendChild(buildPendingEventItem(ev)));
  }

  // Spacer pushes history groups to the bottom
  const spacer = document.createElement('div');
  spacer.className = 'session-list-spacer';
  el.appendChild(spacer);

  // History groups pinned to bottom
  const historyWrap = document.createElement('div');
  historyWrap.className = 'history-groups';
  if (voided.length > 0)    historyWrap.appendChild(buildHistoryGroup('voided',    '已作废', voided,    true));
  if (completed.length > 0) historyWrap.appendChild(buildHistoryGroup('completed', '已完成', completed, false));
  if (voided.length > 0 || completed.length > 0) el.appendChild(historyWrap);

  // Hide the old "view history" footer — no longer needed
  const footer = document.getElementById('panel-footer');
  if (footer) footer.style.display = 'none';
}

/** Build a collapsible history group (voided or completed). */
function buildHistoryGroup(groupId, label, sessions, canRestore) {
  const stored = _historyGroupOpen[groupId] !== false; // open by default

  const wrap = document.createElement('div');
  wrap.className = 'history-group' + (stored ? ' open' : '');
  wrap.id = 'hg-' + groupId;

  // Group header
  const hd = document.createElement('div');
  hd.className = 'history-group-hd';
  hd.onclick = (e) => {
    if (e.target.closest('.hg-clear-btn')) return; // don't toggle when clicking clear
    wrap.classList.toggle('open');
    _historyGroupOpen[groupId] = wrap.classList.contains('open');
  };

  hd.innerHTML = `${label} <span class="hg-count">${sessions.length}</span>
    <span class="hg-spacer"></span><span class="hg-chevron">▾</span>`;
  wrap.appendChild(hd);

  const body = document.createElement('div');
  body.className = 'history-group-body';

  if (groupId === 'completed') {
    // Search row
    const searchRow = document.createElement('div');
    searchRow.className = 'hg-search-row';
    searchRow.innerHTML = `<input class="hg-search" placeholder="搜索…" value="${esc(_completedSearch)}"
      id="hg-completed-search" oninput="_completedSearch=this.value; _completedPage=0; renderSessions()">`;
    body.appendChild(searchRow);

    // Filter + paginate
    const kw = _completedSearch.toLowerCase();
    const filtered2 = kw
      ? sessions.filter(s => (s.name || '').toLowerCase().includes(kw))
      : sessions;
    const totalPages = Math.ceil(filtered2.length / COMPLETED_PAGE_SIZE) || 1;
    _completedPage = Math.min(_completedPage, totalPages - 1);
    const page = filtered2.slice(_completedPage * COMPLETED_PAGE_SIZE, (_completedPage + 1) * COMPLETED_PAGE_SIZE);
    page.forEach(s => body.appendChild(buildSessionItem(s, canRestore)));

    // Pager
    if (totalPages > 1) {
      const pager = document.createElement('div');
      pager.className = 'hg-pager';
      pager.innerHTML = `
        <button class="hg-pager-btn" onclick="_completedPage=Math.max(0,_completedPage-1);renderSessions()" ${_completedPage === 0 ? 'disabled' : ''}>‹</button>
        <span>${_completedPage + 1} / ${totalPages}</span>
        <button class="hg-pager-btn" onclick="_completedPage=Math.min(${totalPages-1},_completedPage+1);renderSessions()" ${_completedPage >= totalPages - 1 ? 'disabled' : ''}>›</button>`;
      body.appendChild(pager);
    }
  } else {
    sessions.forEach(s => body.appendChild(buildSessionItem(s, canRestore)));
  }

  wrap.appendChild(body);
  return wrap;
}

// Track open/close state of each history group
const _historyGroupOpen = { voided: false, completed: false };

function isArchived(s) {
  return s.status === 'completed' || s.status === 'voided' || s.status === 'archived';
}

function buildSessionItem(s, canRestore) {
  if (!s) return document.createElement('div');
  const div = document.createElement('div');
  const archived = isArchived(s);

  div.className = 'session-item'
    + (s.id === currentSessionId ? ' active' : '')
    + (archived ? ' archived-session' + (canRestore ? ' can-restore' : '') : '');

  const icon = SESSION_ICONS[s.type] || '💬';

  let actions = '';
  if (s.id !== 'main') {
    if (archived) {
      // Completed: no buttons (read-only archive)
      // Voided / archived-legacy: ↩ restore only
      if (canRestore) {
        // voided: ↩ restore + 🗑 permanent delete (same style, side by side)
        actions = `<span class="session-actions">
          <button class="sess-act ok"  onclick="restoreSession('${s.id}',event)"     title="恢复">↩</button>
          <button class="sess-act bad" onclick="hardDeleteSession('${s.id}',event)"  title="永久删除">🗑</button>
        </span>`;
      }
    } else if (s.type === 'task' || s.type === 'event') {
      actions = `<span class="session-actions">
        <button class="sess-act" onclick="beginRenameSession('${s.id}',event)" title="重命名">✎</button>
        <button class="sess-act ok"  onclick="completeSession('${s.id}',event)" title="${t('session.complete')}">✓</button>
        <button class="sess-act bad" onclick="voidSession('${s.id}',event)"     title="${t('session.void')}">⊘</button>
      </span>`;
    } else if (s.type === 'conversation') {
      actions = `<span class="session-actions">
        <button class="sess-act" onclick="beginRenameSession('${s.id}',event)" title="重命名">✎</button>
        <button class="sess-act bad" onclick="voidSession('${s.id}',event)" title="${t('session.void')}">⊘</button>
      </span>`;
    } else {
      actions = `<span class="session-actions">
        <button class="sess-act" onclick="beginRenameSession('${s.id}',event)" title="重命名">✎</button>
      </span>`;
    }
  }

  const canRename = s.id !== 'main' && !archived;
  div.innerHTML = `<span class="session-icon">${icon}</span>
    <span class="session-label"${canRename ? ` ondblclick="beginRenameSession('${s.id}',event)"` : ''}>${esc(s.name)}</span>
    ${actions}`;

  // All sessions are clickable (archived sessions open in read-only mode)
  div.onclick = async (e) => {
    if (e.target.closest('.session-actions, .sess-act')) return;
    if (e.target.closest('.session-label-editing')) return;
    switchSession(s.id);
  };
  return div;
}

/** Inline rename a session in the task panel. */
function beginRenameSession(id, ev) {
  if (ev) { ev.stopPropagation(); ev.preventDefault(); }
  if (!id || id === 'main') return;
  const s = sessionData[id];
  if (!s) return;
  // Locate the label within the session-item that contains the triggering element.
  let labelEl = null;
  if (ev && ev.target) {
    const row = ev.target.closest('.session-item');
    if (row) labelEl = row.querySelector('.session-label');
  }
  if (!labelEl) {
    const btn = document.querySelector(`button[onclick*="beginRenameSession('${id}'"]`);
    const row = btn ? btn.closest('.session-item') : null;
    if (row) labelEl = row.querySelector('.session-label');
  }
  if (!labelEl) return;
  _inlineEditLabel(labelEl, s.name || '', async (newName) => {
    await saveSessionRename(id, newName);
  });
}

/** Shared inline-edit helper: replace the label with an input; Enter saves, Esc cancels, blur saves. */
function _inlineEditLabel(labelEl, currentValue, onSave) {
  if (!labelEl || labelEl._editing) return;
  labelEl._editing = true;
  const original = labelEl.textContent;
  const parent = labelEl.parentNode;
  const input = document.createElement('input');
  input.type = 'text';
  input.value = currentValue || original;
  input.className = (labelEl.className || '') + ' session-label-editing';
  input.style.cssText = 'font:inherit;color:inherit;background:var(--surface2);border:1px solid var(--accent);border-radius:4px;padding:1px 6px;outline:none;min-width:80px;width:calc(100% - 24px);box-sizing:border-box;';
  parent.replaceChild(input, labelEl);
  input.focus();
  input.select();
  let done = false;
  const restore = (txt) => {
    if (done) return;
    done = true;
    labelEl.textContent = txt;
    parent.replaceChild(labelEl, input);
    labelEl._editing = false;
  };
  const commit = async () => {
    if (done) return;
    const v = input.value.trim();
    if (!v || v === original) { restore(original); return; }
    try {
      await onSave(v);
      restore(v);
    } catch {
      restore(original);
    }
  };
  input.addEventListener('keydown', (e) => {
    if (e.key === 'Enter')      { e.preventDefault(); commit(); }
    else if (e.key === 'Escape'){ e.preventDefault(); restore(original); }
    e.stopPropagation();
  });
  input.addEventListener('click', e => e.stopPropagation());
  input.addEventListener('dblclick', e => e.stopPropagation());
  input.addEventListener('blur', commit);
}

async function saveSessionRename(id, newName) {
  const res = await fetch(`/api/sessions/${id}/rename`, {
    method: 'PATCH',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ name: newName }),
  });
  if (!res.ok) throw new Error('rename failed');
  if (sessionData[id]) sessionData[id].name = newName;
  // 如果这个 UI session 绑定了一个世界，顺手把世界（WorldOneSession）的 name 也同步改掉。
  // 纯显示名变更，世界后端不会有其它副作用。
  const worldId = sessionData[id]?.canvasSessionId;
  if (worldId) {
    try {
      await fetch(appProxyUrlForWidget(activeWidgetType, `/api/worlds/${encodeURIComponent(worldId)}/rename`), {
        method: 'PATCH',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ name: newName }),
      });
    } catch {}
  }
  renderSessions();
}


/** 计算 canvas 模式的 side-title 完整文本（含 · sessionId 后缀）。 */
function _canvasSideTitle(name) {
  if (!name) return '';
  return (activeWidgetType && canvasSessionId)
    ? `${name} · ${canvasSessionId}`
    : name;
}

/** 双击 canvas 模式的 side-title 重命名当前 canvas session。 */
function beginRenameWorldTitle(ev) {
  if (ev) ev.stopPropagation();
  if (!currentSessionId || currentSessionId === 'main') return;
  const sideTitle = document.getElementById('side-title');
  if (!sideTitle) return;
  const s = sessionData[currentSessionId];
  const currentName = s?.name || '';
  _inlineEditLabel(sideTitle, currentName, async (newName) => {
    await saveSessionRename(currentSessionId, newName);
    // side-title 还原时会被置成 newName，随后我们改回完整格式（含 sessionId 后缀）。
    setTimeout(() => {
      const st = document.getElementById('side-title');
      if (st) st.textContent = _canvasSideTitle(newName);
    }, 0);
  });
}

function buildDivider() {
  const div = document.createElement('div');
  div.className = 'session-divider';
  return div;
}

async function startNewChat() {
  if (isStreaming) stopStreaming();
  const res  = await fetch('/api/sessions', {
    method: 'POST', headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ type: 'conversation', name: t('session.type.conversation') }),
  });
  const { session_id } = await res.json();
  sessionData[session_id] = {
    id: session_id, type: 'conversation', name: t('session.type.conversation'),

    canvasMode: false,
    showWelcome: true,
  };

  switchSession(session_id);
}


// ─── Helpers ──────────────────────────────────────────────────────────────────
function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 120) + 'px';
}

function md(text) {
  if (!text) return '';
  if (typeof marked !== 'undefined') {
    return marked.parse(text);
  }
  // fallback：仅在 marked 未加载时使用（通常不会发生）
  return text.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>')
    .replace(/`([^`]+)`/g,'<code>$1</code>')
    .replace(/\n/g,'<br>');
}

function esc(s) {
  return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

window.addEventListener('resize', () => {
  if (!isCanvasMode) return;
  window.aippHandleResize?.();
});

/**
 * 在当前 chat panel 里插入 sys.* inline 交互卡片。
 * 用于 LLM 触发的 sys.confirm/alert/selection——不弹 modal，不切换 session。
 * canvas 模式下插入侧边面板，chat 模式下插入主消息区。
 */
function addSysInlineCard(widgetType, data) {
  const container = activeMessages();
  if (!container) return;

  const isDanger = !!data.danger;
  const cardEl = document.createElement('div');
  cardEl.className = `msg assistant`;

  // Build inner HTML
  let btnsHtml = '';
  if (widgetType === 'sys.confirm') {
    const mode = data.mode || 'yes_no';
    const [yesLabel, noLabel] = mode === 'ok_cancel' ? ['确定', '取消'] : ['确认删除', '取消'];
    const yesJson = JSON.stringify(data.yes || {}).replace(/"/g, '&quot;');
    const noJson  = JSON.stringify(data.no  || {}).replace(/"/g, '&quot;');
    btnsHtml = `
      <button class="sys-inline-btn secondary" onclick="sysInlineAction(this.closest('.sys-inline-card'),false,null,'${noJson}')">${noLabel}</button>
      <button class="sys-inline-btn ${isDanger ? 'danger' : 'primary'}" onclick="sysInlineAction(this.closest('.sys-inline-card'),true,'${yesJson}',null)">${yesLabel}</button>`;
  } else if (widgetType === 'sys.alert') {
    btnsHtml = `<button class="sys-inline-btn primary" onclick="sysInlineAction(this.closest('.sys-inline-card'),true,null,null)">确定</button>`;
  } else if (widgetType === 'sys.choice' || widgetType === 'sys.selection') {
    (data.options || []).forEach(opt => {
      const optJson = JSON.stringify(opt).replace(/"/g, '&quot;');
      btnsHtml += `<button class="sys-inline-btn ${opt.tool ? 'primary' : 'secondary'}" onclick="sysInlineAction(this.closest('.sys-inline-card'),${!!opt.tool},'${optJson}',null)">${opt.label || ''}</button>`;
    });
  }

  cardEl.innerHTML = `
    <div class="msg-bubble">
      <div class="sys-inline-card${isDanger ? ' danger' : ''}">
        ${data.title ? `<div class="sys-inline-title">${data.title}</div>` : ''}
        ${data.message ? `<div class="sys-inline-message">${data.message}</div>` : ''}
        <div class="sys-inline-buttons">${btnsHtml}</div>
      </div>
    </div>`;

  container.appendChild(cardEl);
  container.scrollTop = container.scrollHeight;
}

async function ensureMemoryManagerVisibleAfterTool(toolName) {
  if (!toolName || !String(toolName).startsWith('memory_')) return;
  // For deletion/cleanup flows, force-open memory-manager to avoid blank canvas.
  if (!String(toolName).includes('delete')) return;
  try {
    const result = await memProxyTool('memory_view', { scope: 'ALL' });
    const mount = _ensureAippCanvasMount();
    await mountAippWidget(mount, 'memory-manager', (result && result.graph) || {});
  } catch (e) {
    console.warn('[memory-manager] auto-open after delete failed', e);
  }
}

async function sysInlineAction(cardEl, confirmed, yesJsonStr, noJsonStr) {
  if (!cardEl) return;
  cardEl.querySelectorAll('button').forEach(b => b.disabled = true);

  try {
    if (confirmed && yesJsonStr) {
      const yes = JSON.parse(yesJsonStr.replace(/&quot;/g, '"'));
      if (yes.tool) {
        await memProxyTool(yes.tool, yes.args || {});
        // Notify any mounted AIPP widget that an external tool completed, so it
        // can refresh its data. Widgets opt in by listening to this event.
        window.dispatchEvent(new CustomEvent('aipp:tool-completed', { detail: { tool: yes.tool } }));
        await ensureMemoryManagerVisibleAfterTool(yes.tool);
      }
      cardEl.innerHTML = '<div class="sys-inline-done">✓ 操作已完成</div>';
    } else {
      const no = noJsonStr ? JSON.parse(noJsonStr.replace(/&quot;/g, '"')) : null;
      const msg = no && no.message ? no.message : '已取消';
      cardEl.innerHTML = `<div class="sys-inline-done">${msg}</div>`;
    }
  } catch(e) {
    cardEl.innerHTML = '<div class="sys-inline-done" style="color:var(--danger)">操作失败</div>';
  }
}

let _sysModalResolve = null;

/**

async function w1Confirm(opts = {}) {

/**
 * 显示 sys.* 系统模态框，返回 Promise<{confirmed: bool, value?: string}>
 * data 结构遵循 AippSystemWidget 规范（见 shared/aipp-protocol）
 */
function showSysModal(widgetType, data) {
  return new Promise(resolve => {
    _sysModalResolve = resolve;
    const overlay  = document.getElementById('sys-modal-overlay');
    const titleEl  = document.getElementById('sys-modal-title');
    const msgEl    = document.getElementById('sys-modal-message');
    const inputEl  = document.getElementById('sys-modal-input');
    const btnsEl   = document.getElementById('sys-modal-buttons');

    titleEl.textContent = data.title  || '';
    msgEl.textContent   = data.message || '';
    btnsEl.innerHTML    = '';
    inputEl.style.display = 'none';
    inputEl.value = '';

    if (widgetType === 'sys.prompt') {
      inputEl.placeholder   = data.placeholder || '';
      inputEl.style.display = 'block';
      setTimeout(() => inputEl.focus(), 50);
    }

    if (widgetType === 'sys.confirm') {
      const mode    = data.mode || 'yes_no';
      const isDanger = !!data.danger;
      const yesLabel = data.confirmLabel
        || (mode === 'ok_cancel' ? '确定' : '确认删除');
      const noLabel  = data.cancelLabel || '取消';

      const yesBtn = document.createElement('button');
      yesBtn.className = `sys-modal-btn ${isDanger ? 'danger' : 'primary'}`;
      yesBtn.textContent = yesLabel;
      yesBtn.onclick = () => closeSysModal(true);

      const noBtn = document.createElement('button');
      noBtn.className = 'sys-modal-btn secondary';
      noBtn.textContent = noLabel;
      noBtn.onclick = () => closeSysModal(false);

      btnsEl.appendChild(noBtn);
      btnsEl.appendChild(yesBtn);
    } else if (widgetType === 'sys.alert') {
      const okBtn = document.createElement('button');
      okBtn.className = 'sys-modal-btn primary';
      okBtn.textContent = '确定';
      okBtn.onclick = () => closeSysModal(true);
      btnsEl.appendChild(okBtn);
    } else if (widgetType === 'sys.prompt') {
      const cancelBtn = document.createElement('button');
      cancelBtn.className = 'sys-modal-btn secondary';
      cancelBtn.textContent = '取消';
      cancelBtn.onclick = () => closeSysModal(false);

      const submitBtn = document.createElement('button');
      submitBtn.className = 'sys-modal-btn primary';
      submitBtn.textContent = '确定';
      submitBtn.onclick = () => closeSysModal(true, inputEl.value.trim());
      inputEl.onkeydown = e => { if (e.key === 'Enter') submitBtn.click(); };

      btnsEl.appendChild(cancelBtn);
      btnsEl.appendChild(submitBtn);
    } else if (widgetType === 'sys.choice' || widgetType === 'sys.selection') {
      (data.options || []).forEach(opt => {
        const btn = document.createElement('button');
        btn.className = opt.tool ? 'sys-modal-btn primary' : 'sys-modal-btn secondary';
        btn.textContent = opt.label || '';
        btn.onclick = () => closeSysModal(!!opt.tool, null, opt);
        btnsEl.appendChild(btn);
      });
    }

    overlay.classList.add('open');
  });
}

function closeSysModal(confirmed, value, choiceOption) {
  document.getElementById('sys-modal-overlay').classList.remove('open');
  if (_sysModalResolve) {
    _sysModalResolve({ confirmed, value, choiceOption });
    _sysModalResolve = null;
  }
}

document.addEventListener('keydown', (e) => {
  if (e.key !== 'Escape') return;
  if (typeof window.closeActionEditor === 'function') {
    e.preventDefault();
    window.closeActionEditor();
    return;
  }
  if (typeof window.closeDecisionEditor === 'function') {
    e.preventDefault();

  if (sysOverlay?.classList.contains('open')) {

});

/**
 * 处理 canvas action=open 且 widget_type 为 sys.* 的指令。
 * 渲染系统模态框，用户响应后自动通过 ToolProxy 执行 yes/submit 工具。
 */
async function handleSysWidgetCommand(widgetType, data) {
  if (!data) return;
  const { confirmed, value, choiceOption } = await showSysModal(widgetType, data);

  if (widgetType === 'sys.confirm') {
    if (confirmed && data.yes && data.yes.tool) {
      await memProxyTool(data.yes.tool, data.yes.args || {});
      window.dispatchEvent(new CustomEvent('aipp:tool-completed', { detail: { tool: data.yes.tool } }));
      await ensureMemoryManagerVisibleAfterTool(data.yes.tool);
    } else if (!confirmed && data.no && data.no.message) {
      appendAssistantMessage(data.no.message);
    }
  } else if (widgetType === 'sys.alert') {
    if (data.close_message) appendAssistantMessage(data.close_message);
  } else if (widgetType === 'sys.prompt') {
    if (confirmed && value !== null && data.submit && data.submit.tool) {
      const args = { [data.submit.arg_name || 'value']: value };
      await memProxyTool(data.submit.tool, args);
    } else if (!confirmed && data.cancel && data.cancel.message) {
      appendAssistantMessage(data.cancel.message);
    }
  } else if (widgetType === 'sys.choice' || widgetType === 'sys.selection') {
    if (confirmed && choiceOption) {
      if (choiceOption.tool) {
        await memProxyTool(choiceOption.tool, choiceOption.args || {});
      } else if (choiceOption.message) {
        appendAssistantMessage(choiceOption.message);
      }
    }
  }
}
